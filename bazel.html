<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جهاز البازر | Giant Buzzer ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c;
            --bg-dark: #050505;
        }
        body {
            background: var(--bg-dark);
            color: white; font-family: 'Cairo', sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; overflow: hidden;
        }

        /* زر البازر العملاق */
        .buzzer-btn {
            width: 280px; height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at top, #ff4d4d, #990000);
            border: 10px solid #330000;
            box-shadow: 0 15px 0 #660000, 0 20px 50px rgba(255, 0, 60, 0.3);
            cursor: pointer; transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
            position: relative; -webkit-tap-highlight-color: transparent;
        }

        .buzzer-btn:active:not(.disabled) {
            transform: translateY(10px);
            box-shadow: 0 5px 0 #660000, 0 10px 30px rgba(255, 0, 60, 0.5);
        }

        .buzzer-btn.disabled {
            filter: grayscale(1) opacity(0.5);
            cursor: not-allowed; transform: translateY(10px);
            box-shadow: none;
        }

        .winner-flash {
            animation: flash 0.5s infinite alternate;
        }
        @keyframes flash {
            from { box-shadow: 0 0 20px #facc15; }
            to { box-shadow: 0 0 60px #facc15; border-color: #facc15; }
        }

        .glass-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px;
            color: white; width: 100%;
            margin-bottom: 15px; outline: none;
            appearance: none;
        }
        select option { background: #111; color: white; }
    </style>
</head>
<body>

    <div id="setup-ui" class="flex flex-col items-center w-full max-w-xs p-6 bg-white/5 rounded-3xl border border-white/10 backdrop-blur-xl">
        <h2 class="text-3xl mb-8 font-black text-red-500 text-center">دخول الحلبة ⚔️</h2>
        
        <label class="w-full text-xs mb-2 text-slate-400 mr-2">اختر الفريق:</label>
        <select id="teamSelect" class="glass-select" onchange="loadPlayers(this.value)">
            <option value="">جاري تحميل الفرق...</option>
        </select>

        <label class="w-full text-xs mb-2 text-slate-400 mr-2">اختر اسمك:</label>
        <select id="playerSelect" class="glass-select">
            <option value="">اختر الفريق أولاً</option>
        </select>

        <button onclick="saveIdentity()" class="w-full bg-red-600 hover:bg-red-500 py-4 mt-4 rounded-xl font-black transition-all shadow-lg shadow-red-600/20">تأكيد الدخول</button>
    </div>

    <div id="buzzer-ui" class="hidden flex flex-col items-center">
        <div id="status-text" class="mb-8 text-2xl font-bold text-slate-400">جاهز للهجوم...</div>
        
        <button id="mainBuzzer" onclick="hitBuzzer()" class="buzzer-btn">
            <span class="text-white text-4xl font-black select-none">اضغط!</span>
        </button>

        <div class="mt-12 p-4 bg-white/5 rounded-2xl border border-white/10 text-slate-300 text-sm font-bold" id="identity-tag"></div>
        <button onclick="clearIdentity()" class="mt-6 text-xs text-slate-600 hover:text-red-500 transition-colors">تغيير الحساب</button>
    </div>

    <audio id="buzzerSound" src="بازل.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, runTransaction, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = localStorage.getItem('giant_name');
        let myTeam = localStorage.getItem('giant_team');
        let allTeamsData = {};

        // 1. تحميل الفرق واللاعبين من السيرفر
        onValue(ref(db, 'teams'), (snap) => {
            allTeamsData = snap.val() || {};
            const teamSelect = document.getElementById('teamSelect');
            teamSelect.innerHTML = '<option value="">--- اختر فريقك ---</option>';
            
            Object.keys(allTeamsData).forEach(teamName => {
                const opt = document.createElement('option');
                opt.value = teamName;
                opt.innerText = teamName;
                teamSelect.appendChild(opt);
            });
        });

        window.loadPlayers = (teamName) => {
            const playerSelect = document.getElementById('playerSelect');
            playerSelect.innerHTML = '<option value="">--- اختر اسمك ---</option>';
            if(!teamName || !allTeamsData[teamName]) return;

            const players = allTeamsData[teamName].players || [];
            players.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name;
                opt.innerText = p.name;
                playerSelect.appendChild(opt);
            });
        };

        window.saveIdentity = () => {
            const t = document.getElementById('teamSelect').value;
            const n = document.getElementById('playerSelect').value;
            if(!t || !n) return alert("اختر فريقك واسمك أولاً!");
            
            localStorage.setItem('giant_name', n);
            localStorage.setItem('giant_team', t);
            location.reload();
        };

        window.clearIdentity = () => {
            localStorage.clear();
            location.reload();
        };

        // تفعيل واجهة البازر إذا كان مسجلاً
        if(myName && myTeam) {
            document.getElementById('setup-ui').classList.add('hidden');
            document.getElementById('buzzer-ui').classList.remove('hidden');
            document.getElementById('identity-tag').innerText = `🎖️ الفريق: ${myTeam} | 👤 اللاعب: ${myName}`;
        }

        const btn = document.getElementById('mainBuzzer');
        const status = document.getElementById('status-text');
        const bSound = document.getElementById('buzzerSound');

        // مراقبة حالة البازر
        onValue(ref(db, 'buzzer_status'), (snap) => {
            if(snap.val() === 'open') {
                btn.classList.remove('disabled');
                status.innerText = "انقض الآن! 🔥";
            } else {
                btn.classList.add('disabled');
                status.innerText = "انتظر الإشارة...";
            }
        });

        // مراقبة الفائز
        onValue(ref(db, 'buzzer_winner'), (snap) => {
            const winner = snap.val();
            if(winner && winner.name) {
                if(winner.name === myName) {
                    status.innerText = "أنت الأسرع! 🏆";
                    status.classList.add('text-yellow-500');
                    btn.classList.add('winner-flash');
                    bSound.play(); // تشغيل صوت بازل.mp3
                } else {
                    btn.classList.add('disabled');
                    status.innerText = `سبقك ${winner.name}! 💨`;
                }
            } else {
                btn.classList.remove('winner-flash');
                status.classList.remove('text-yellow-500');
            }
        });

        window.hitBuzzer = () => {
            if(btn.classList.contains('disabled')) return;

            runTransaction(ref(db, 'buzzer_winner'), (current) => {
                if (!current) {
                    return { name: myName, team: myTeam, time: Date.now() };
                }
                return; 
            }).then((res) => {
                if(res.committed) {
                    set(ref(db, 'buzzer_status'), 'locked');
                }
            });
        };

    </script>
</body>
</html>
