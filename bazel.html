<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جهاز البازر | Giant Buzzer ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c;
            --bg-dark: #050505;
        }
        body {
            background: var(--bg-dark);
            color: white; font-family: 'Cairo', sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; overflow: hidden;
        }

        /* زر البازر العملاق */
        .buzzer-btn {
            width: 280px; height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at top, #ff4d4d, #990000);
            border: 10px solid #330000;
            box-shadow: 0 15px 0 #660000, 0 20px 50px rgba(255, 0, 60, 0.3);
            cursor: pointer; transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
            position: relative; -webkit-tap-highlight-color: transparent;
        }

        .buzzer-btn:active:not(.disabled) {
            transform: translateY(10px);
            box-shadow: 0 5px 0 #660000, 0 10px 30px rgba(255, 0, 60, 0.5);
        }

        .buzzer-btn.disabled {
            filter: grayscale(1) opacity(0.5);
            cursor: not-allowed; transform: translateY(10px);
            box-shadow: none;
        }

        /* تأثير الضوء عند الفوز */
        .winner-flash {
            animation: flash 0.5s infinite alternate;
        }
        @keyframes flash {
            from { box-shadow: 0 0 20px #facc15; }
            to { box-shadow: 0 0 60px #facc15; border-color: #facc15; }
        }

        .glass-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px;
            text-align: center; color: white; width: 80%;
            margin-bottom: 20px; outline: none;
        }
    </style>
</head>
<body>

    <div id="setup-ui" class="flex flex-col items-center w-full max-w-xs">
        <h2 class="text-2xl mb-6 font-black text-red-500">تعريف العملاق 👤</h2>
        <input type="text" id="playerName" placeholder="اسمك" class="glass-input">
        <input type="text" id="playerTeam" placeholder="اسم فريقك (نفس المكتوب للأدمن)" class="glass-input">
        <button onclick="saveIdentity()" class="w-full bg-red-600 py-4 rounded-xl font-black">دخول الحلبة</button>
    </div>

    <div id="buzzer-ui" class="hidden flex flex-col items-center">
        <div id="status-text" class="mb-8 text-xl font-bold text-slate-400">جاهز للهجوم...</div>
        
        <button id="mainBuzzer" onclick="hitBuzzer()" class="buzzer-btn">
            <span class="text-white text-4xl font-black select-none">اضغط!</span>
        </button>

        <div class="mt-12 text-slate-500 text-sm italic" id="identity-tag"></div>
        <button onclick="clearIdentity()" class="mt-4 text-xs text-slate-700 underline">تغيير الاسم</button>
    </div>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
    <audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, runTransaction, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = localStorage.getItem('giant_name');
        let myTeam = localStorage.getItem('giant_team');

        // التحقق من الهوية
        window.saveIdentity = () => {
            const n = document.getElementById('playerName').value;
            const t = document.getElementById('playerTeam').value;
            if(!n || !t) return alert("اكتب اسمك وفريقك يا بطل!");
            localStorage.setItem('giant_name', n);
            localStorage.setItem('giant_team', t);
            location.reload();
        };

        window.clearIdentity = () => {
            localStorage.clear();
            location.reload();
        };

        if(myName && myTeam) {
            document.getElementById('setup-ui').classList.add('hidden');
            document.getElementById('buzzer-ui').classList.remove('hidden');
            document.getElementById('identity-tag').innerText = `المتسابق: ${myName} | فريق: ${myTeam}`;
        }

        const btn = document.getElementById('mainBuzzer');
        const status = document.getElementById('status-text');

        // المنطق العاقل: مراقبة حالة البازر من السيرفر
        onValue(ref(db, 'buzzer_status'), (snap) => {
            const state = snap.val();
            if(state === 'open') {
                enableBuzzer();
            } else {
                disableBuzzer("انتظر الإشارة...");
            }
        });

        // مراقبة لو فيه فائز بالفعل
        onValue(ref(db, 'buzzer_winner'), (snap) => {
            const winner = snap.val();
            if(winner && winner.name) {
                if(winner.name === myName) {
                    status.innerText = "أنت الأسرع! 🏆";
                    status.classList.add('text-yellow-500');
                    btn.classList.add('winner-flash');
                    document.getElementById('winSound').play();
                } else {
                    disableBuzzer(`خطفها ${winner.name}! 💨`);
                }
            } else {
                btn.classList.remove('winner-flash');
                status.classList.remove('text-yellow-500');
            }
        });

        window.hitBuzzer = () => {
            if(btn.classList.contains('disabled')) return;

            document.getElementById('clickSound').play();

            // استخدام Transaction لضمان أن شخص واحد فقط يفوز في نفس الميكرو-ثانية
            runTransaction(ref(db, 'buzzer_winner'), (currentData) => {
                if (currentData === "" || currentData === null) {
                    // السيرفر فاضي؟ مبروك إنت الفائز
                    return { name: myName, team: myTeam, time: Date.now() };
                } else {
                    // فيه حد سبقك؟ لا تغير البيانات
                    return; 
                }
            }).then((result) => {
                if(result.committed) {
                    // لو العملية نجحت، اقفل البازر عند الكل
                    set(ref(db, 'buzzer_status'), 'locked');
                }
            });
        };

        function disableBuzzer(msg) {
            btn.classList.add('disabled');
            status.innerText = msg;
        }

        function enableBuzzer() {
            btn.classList.remove('disabled');
            status.innerText = "انقض الآن! 🔥";
        }

    </script>
</body>
</html>
