<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بازر العمالقة ⚡</title>
    <style>
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'Galaxy'; src: url('جالاكسي.ttf'); }
        @font-face { font-family: 'Dahka'; src: url('ضحكه.ttf'); }

        :root {
            --neon-blue: #00f7ff;
            --gold: #facc15;
            --bg: #050810;
        }

        body {
            margin: 0; background: var(--bg); height: 100vh;
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; touch-action: none;
            background-image: radial-gradient(circle at center, #1e0b4a 0%, #050112 100%);
        }

        /* الجزء العلوي: اختيار اللاعب */
        .setup-card {
            width: 90%; margin-top: 20px; padding: 15px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            border-radius: 15px; border: 1px solid var(--neon-blue);
            text-align: center;
        }

        #playerPicker {
            width: 100%; padding: 12px; background: #111827; color: var(--neon-blue);
            border: 1px solid var(--neon-blue); border-radius: 8px;
            font-family: 'Galaxy'; font-size: 1.1rem; outline: none;
        }

        .identity-display { margin-top: 10px; display: none; }
        .identity-display h2 { font-family: 'Dahka'; color: var(--gold); font-size: 2rem; margin: 5px 0; }

        /* منطقة البازر */
        .buzzer-area {
            flex: 1; display: flex; justify-content: center; align-items: center; width: 100%;
        }

        .main-btn {
            width: 260px; height: 260px; border-radius: 50%;
            border: none; position: relative; cursor: pointer;
            background: radial-gradient(circle, #2d1363 0%, #050810 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            transition: transform 0.05s; -webkit-tap-highlight-color: transparent;
        }

        .main-btn:active { transform: scale(0.9); }

        .glow {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid var(--neon-blue); opacity: 0; transition: 0.3s;
        }

        /* لما الأدمن يفتح البازر */
        .active-mode .glow { opacity: 1; animation: blink 1.2s infinite; }
        .locked-mode { filter: grayscale(1); opacity: 0.4; pointer-events: none; }

        .main-btn span { font-family: 'Belabelo'; font-size: 4rem; color: white; text-shadow: 0 0 15px var(--neon-blue); }

        @keyframes blink { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
        
        .success-flash { background: var(--gold) !important; transition: 0.1s; }
    </style>
</head>
<body class="locked-mode" id="pageContainer">

    <div class="setup-card" id="setupZone">
        <select id="playerPicker">
            <option value="" disabled selected>انتظر بدء المباراة...</option>
        </select>
        <div class="identity-display" id="idDisplay">
            <p style="margin:0; font-size:0.8rem;">أنت الآن العملاق:</p>
            <h2 id="nameTag">---</h2>
        </div>
    </div>

    <div class="buzzer-area">
        <button class="main-btn" id="fireBtn">
            <div class="glow"></div>
            <span>إجابة</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const playerPicker = document.getElementById('playerPicker');
        const pageContainer = document.getElementById('pageContainer');
        const idDisplay = document.getElementById('idDisplay');
        const nameTag = document.getElementById('nameTag');

        // 1. مراقبة المباراة النشطة (سحب الأسماء من teams اللي في الفايربيز)
        onValue(ref(db, 'active_match'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                playerPicker.innerHTML = `<option value="" disabled selected>اختر اسمك من القائمة</option>`;
                
                // إضافة لعيبة الفريق الأول (A)
                data.teamA.players.forEach(p => {
                    playerPicker.innerHTML += `<option value="${p}" data-team="${data.teamA.name}">${p} (${data.teamA.name})</option>`;
                });
                // إضافة لعيبة الفريق الثاني (B)
                data.teamB.players.forEach(p => {
                    playerPicker.innerHTML += `<option value="${p}" data-team="${data.teamB.name}">${p} (${data.teamB.name})</option>`;
                });
            }
        });

        // 2. عند اختيار اللاعب
        playerPicker.addEventListener('change', (e) => {
            const name = e.target.value;
            nameTag.innerText = name;
            playerPicker.style.display = 'none';
            idDisplay.style.display = 'block';
        });

        // 3. التحكم في حالة البازر (مفتوح/مقفول)
        onValue(ref(db, 'buzzer_status'), (snapshot) => {
            if (snapshot.val() === "open") {
                pageContainer.classList.remove('locked-mode');
                pageContainer.classList.add('active-mode');
            } else {
                pageContainer.classList.add('locked-mode');
                pageContainer.classList.remove('active-mode');
                document.body.classList.remove('success-flash');
            }
        });

        // 4. إرسال الضغطة (الأسرع يفوز)
        document.getElementById('fireBtn').addEventListener('pointerdown', async () => {
            const myName = nameTag.innerText;
            if (myName === "---") return alert("اختر اسمك الأول!");

            const team = playerPicker.options[playerPicker.selectedIndex].getAttribute('data-team');
            
            if (navigator.vibrate) navigator.vibrate(150);

            // استخدام Transaction لضمان إن الأسرع بالملي ثانية هو اللي يتسجل
            const winnerRef = ref(db, 'buzzer_winner');
            await runTransaction(winnerRef, (current) => {
                if (current === null || current === "") {
                    return { name: myName, team: team, time: serverTimestamp() };
                }
                return; 
            });
            document.body.classList.add('success-flash');
        });
    </script>
</body>
</html>
