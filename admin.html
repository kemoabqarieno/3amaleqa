<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القيادة المركزية | العمالقة 🕹️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'Amira'; src: url('اميرة.ttf'); }
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'DGRawnaq'; src: url('دي جي راونق.ttf'); }
        @font-face { font-family: 'Dahka'; src: url('ضحكه.ttf'); }

        :root {
            --neon-red: #ff003c; --neon-gold: #facc15; --bg-dark: #0a0505;
        }

        body {
            background: radial-gradient(circle at center, #101827 0%, var(--bg-dark) 100%);
            color: white; font-family: 'Cairo', sans-serif; min-height: 100vh;
        }

        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { border-bottom: 4px solid var(--neon-red); color: var(--neon-red); }
        .team-box.selected { border: 2px solid var(--neon-gold); background: rgba(250, 204, 21, 0.2); transform: scale(1.05); }
        
        /* انيميشن النبض للبازر */
        .strike-alert { animation: strike-pulse 0.5s infinite alternate; border: 3px solid var(--neon-red) !important; }
        @keyframes strike-pulse { from { box-shadow: 0 0 10px var(--neon-red); } to { box-shadow: 0 0 30px var(--neon-red); } }
    </style>
</head>
<body class="p-4 lg:p-8">

    <header class="flex justify-between items-center mb-6 glass p-6 rounded-2xl">
        <div class="flex items-center gap-4">
            <h1 style="font-family: 'Amira';" class="text-4xl text-yellow-500">لوحة تحكم العمالقة</h1>
        </div>
        <div class="flex gap-4">
            <button onclick="resetFullMatch()" class="bg-red-900/50 text-red-400 px-4 py-2 rounded-lg text-xs font-bold border border-red-500/30">إنهاء المباراة وتصفير الساحة ⚠️</button>
            <div id="status" class="bg-green-500/10 text-green-400 px-4 py-2 rounded-full border border-green-500/30 text-xs font-black">RADAR ACTIVE</div>
        </div>
    </header>

    <nav class="flex gap-4 mb-6 border-b border-slate-700 overflow-x-auto">
        <button onclick="openTab('live')" id="tab-live" class="pb-3 px-6 font-bold active-tab">الساحة</button>
        <button onclick="openTab('qbank')" id="tab-qbank" class="pb-3 px-6 font-bold text-slate-500">الأسئلة</button>
        <button onclick="openTab('judge')" id="tab-judge" class="pb-3 px-6 font-bold text-slate-500 relative">
            التحكيم
            <span id="judge-badge" class="hidden absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full animate-ping"></span>
        </button>
    </nav>

    <section id="live" class="tab-content block space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass p-6 rounded-2xl">
                <h3 class="text-red-500 font-black mb-4 uppercase tracking-widest text-sm">رادار الفرق المتصلة</h3>
                <div class="grid grid-cols-4 md:grid-cols-6 gap-3" id="teamsGrid"></div>
                <div class="mt-8 flex gap-4 justify-center">
                    <button onclick="deployMatch()" class="bg-red-600 hover:bg-red-700 text-white px-12 py-4 rounded-xl font-black text-xl transition-all shadow-xl">إطلاق المباراة 🚀</button>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass p-6 rounded-2xl text-center">
                    <div id="timer-display" class="text-6xl font-black text-yellow-500 mb-4" style="font-family: 'DGRawnaq';">30</div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="controlTimer('start')" class="bg-green-600/20 text-green-400 py-2 rounded-lg border border-green-500/30 font-bold">بدء</button>
                        <button onclick="controlTimer('pause')" class="bg-yellow-600/20 text-yellow-400 py-2 rounded-lg border border-yellow-500/30 font-bold">وقف</button>
                        <button onclick="controlTimer('reset')" class="bg-red-600/20 text-red-400 py-2 rounded-lg border border-red-500/30 font-bold">صفر</button>
                    </div>
                </div>
                
                <div class="glass p-4 rounded-2xl space-y-4" id="manualScoreControls">
                    <p class="text-center text-xs text-slate-400">تعديل النقاط يدوياً</p>
                    <div class="flex justify-between items-center" id="teamA_row">
                        <span id="labelA" class="font-bold text-sm">--</span>
                        <div class="flex gap-2">
                            <button onclick="adjustScore('teamA', 5)" class="bg-blue-600 w-8 h-8 rounded">+</button>
                            <button onclick="adjustScore('teamA', -5)" class="bg-slate-700 w-8 h-8 rounded">-</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center" id="teamB_row">
                        <span id="labelB" class="font-bold text-sm">--</span>
                        <div class="flex gap-2">
                            <button onclick="adjustScore('teamB', 5)" class="bg-blue-600 w-8 h-8 rounded">+</button>
                            <button onclick="adjustScore('teamB', -5)" class="bg-slate-700 w-8 h-8 rounded">-</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="qbank" class="tab-content hidden space-y-6">
        <div class="glass p-6 rounded-2xl">
            <select id="fileSelector" class="w-full bg-slate-900 border border-red-500/30 p-4 rounded-xl text-yellow-400 font-bold mb-6" onchange="loadQuestionsFromFile()">
                <option value="علوم">بنك الأسئلة: العلوم والتكنولوجيا 🧪</option>
                <option value="ثقافة">بنك الأسئلة: الثقافة العامة 🌍</option>
            </select>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="qBankGrid"></div>
        </div>
    </section>

    <section id="judge" class="tab-content hidden">
        <div id="buzzerPanel" class="glass p-10 rounded-[3rem] text-center transition-all duration-500">
            <div id="waitingState" class="py-10">
                <div class="w-16 h-16 border-4 border-slate-700 border-t-red-500 rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-slate-500 font-bold">في انتظار ضغطة العمالقة...</p>
            </div>
            
            <div id="strikeState" class="hidden">
                <div class="bg-yellow-500 text-black inline-block px-6 py-1 rounded-full font-black text-sm mb-4">تم الضغط!</div>
                <h2 id="winnerName" class="text-6xl font-black mb-2" style="font-family: 'Belabelo';">---</h2>
                <p id="winnerTeam" class="text-2xl text-red-500 font-bold mb-6">---</p>
                
                <div class="bg-black/40 p-6 rounded-2xl mb-8 border border-white/5">
                    <p class="text-xs text-slate-400 mb-2">الإجابة الصحيحة:</p>
                    <p id="adminAnswerView" class="text-3xl font-bold text-green-400">---</p>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <button onclick="handleJudge(true)" class="bg-green-600 hover:bg-green-500 py-8 rounded-2xl font-black text-3xl shadow-xl transition-all active:scale-95">صح ✅</button>
                    <button onclick="handleJudge(false)" class="bg-red-600 hover:bg-red-500 py-8 rounded-2xl font-black text-3xl shadow-xl transition-all active:scale-95">خطأ ❌</button>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-4 mt-8">
            <button onclick="toggleAnswer()" class="bg-blue-600 py-4 rounded-xl font-bold">كشف/إخفاء الإجابة 👁️</button>
            <button onclick="toggleWheel()" class="bg-purple-600 py-4 rounded-xl font-bold">إظهار العجلة 🎡</button>
            <button onclick="triggerSpin()" class="bg-yellow-500 text-black py-4 rounded-xl font-black">تدوير العجلة الآن! 🌀</button>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let selectedTeams = [];
        let allTeams = {};
        let currentQ = null;
        let timeLeft = 30;
        let totalQTime = 30; // لتصحيح انيميشن الدائرة
        let timerInterval = null;

        // 1. إدارة الفرق والرادار
        onValue(ref(db, 'teams'), (snap) => {
            allTeams = snap.val() || {};
            const grid = document.getElementById('teamsGrid');
            grid.innerHTML = '';
            Object.keys(allTeams).forEach(name => {
                const box = document.createElement('div');
                box.className = `glass p-4 rounded-xl text-center cursor-pointer font-bold team-box ${selectedTeams.includes(name) ? 'selected' : ''}`;
                box.innerText = name;
                box.onclick = () => {
                    if(selectedTeams.includes(name)) selectedTeams = selectedTeams.filter(t => t !== name);
                    else if(selectedTeams.length < 2) selectedTeams.push(name);
                    updateRadarUI();
                };
                grid.appendChild(box);
            });
        });

        function updateRadarUI() {
            document.querySelectorAll('.team-box').forEach(box => {
                box.classList.toggle('selected', selectedTeams.includes(box.innerText));
            });
        }

        window.deployMatch = () => {
            if(selectedTeams.length < 2) return alert("يجب اختيار فريقين للمواجهة!");
            set(ref(db, 'active_match'), {
                teamA: { name: selectedTeams[0], score: allTeams[selectedTeams[0]].score || 0 },
                teamB: { name: selectedTeams[1], score: allTeams[selectedTeams[1]].score || 0 }
            });
            document.getElementById('labelA').innerText = selectedTeams[0];
            document.getElementById('labelB').innerText = selectedTeams[1];
            openTab('qbank');
        };

        // 2. إدارة الأسئلة
        const questions = {
            "علوم": [{t:"ما هو العنصر الأثقل؟", a:"اليورانيوم", s:15}, {t:"كم عدد الكواكب؟", a:"8", s:10}],
            "ثقافة": [{t:"من هو مؤسس الدولة الأموية؟", a:"معاوية بن أبي سفيان", s:20}]
        };

        window.loadQuestionsFromFile = () => {
            const file = document.getElementById('fileSelector').value;
            const grid = document.getElementById('qBankGrid');
            grid.innerHTML = '';
            questions[file].forEach(q => {
                const b = document.createElement('button');
                b.className = "glass p-4 text-right hover:border-yellow-500 transition-all font-bold";
                b.innerText = q.t;
                b.onclick = () => {
                    currentQ = q;
                    totalQTime = q.s;
                    timeLeft = q.s;
                    set(ref(db, 'current_question'), { text: q.t, answer: q.a });
                    set(ref(db, 'buzzer_winner'), ""); 
                    set(ref(db, 'buzzer_status'), 'open');
                    set(ref(db, 'show_answer'), false);
                    document.getElementById('adminAnswerView').innerText = q.a;
                    controlTimer('start');
                    openTab('judge');
                };
                grid.appendChild(b);
            });
        };

        // 3. التحكم بالتايمر
        window.controlTimer = (action) => {
            clearInterval(timerInterval);
            if(action === 'start') {
                timerInterval = setInterval(() => {
                    if(timeLeft > 0) {
                        timeLeft--;
                        document.getElementById('timer-display').innerText = timeLeft;
                        set(ref(db, 'timer_value'), timeLeft);
                        // إرسال الـ TotalTime لتصحيح انيميشن الدائرة في الشاشة الرئيسية
                        set(ref(db, 'timer_total_ref'), totalQTime);
                    } else { clearInterval(timerInterval); }
                }, 1000);
            } else if(action === 'reset') {
                timeLeft = totalQTime;
                document.getElementById('timer-display').innerText = timeLeft;
                set(ref(db, 'timer_value'), timeLeft);
            }
        };

        // 4. نظام التحكيم المتطور
        onValue(ref(db, 'buzzer_winner'), (snap) => {
            const w = snap.val();
            const badge = document.getElementById('judge-badge');
            if(w && w.name) {
                document.getElementById('winnerName').innerText = w.name;
                document.getElementById('winnerTeam').innerText = w.team;
                document.getElementById('waitingState').classList.add('hidden');
                document.getElementById('strikeState').classList.remove('hidden');
                document.getElementById('buzzerPanel').classList.add('strike-alert');
                badge.classList.remove('hidden');
                controlTimer('pause');
            } else {
                document.getElementById('waitingState').classList.remove('hidden');
                document.getElementById('strikeState').classList.add('hidden');
                document.getElementById('buzzerPanel').classList.remove('strike-alert');
                badge.classList.add('hidden');
            }
        });

        window.handleJudge = async (isCorrect) => {
            const snap = await get(ref(db, 'buzzer_winner'));
            const winner = snap.val();
            if(!winner) return;

            if(isCorrect) {
                const matchSnap = await get(ref(db, 'active_match'));
                const m = matchSnap.val();
                const teamKey = (winner.team === m.teamA.name) ? 'teamA' : 'teamB';
                runTransaction(ref(db, `active_match/${teamKey}/score`), s => (s||0) + 10);
                runTransaction(ref(db, `teams/${winner.team}/score`), s => (s||0) + 10);
            }
            // أتمتة: بعد التحكيم، صفر البازر وافتح السؤال التالي
            set(ref(db, 'buzzer_winner'), "");
            set(ref(db, 'buzzer_status'), 'locked');
            set(ref(db, 'show_answer'), false);
            openTab('qbank');
        };

        // 5. ميزات إضافية
        window.adjustScore = (teamKey, amount) => {
            runTransaction(ref(db, `active_match/${teamKey}/score`), s => (s||0) + amount);
        };

        window.toggleAnswer = () => {
            get(ref(db, 'show_answer')).then(s => set(ref(db, 'show_answer'), !s.val()));
        };

        window.toggleWheel = () => {
            get(ref(db, 'wheel_status')).then(s => set(ref(db, 'wheel_status'), s.val()==='show'?'hide':'show'));
        };

        window.triggerSpin = () => {
            set(ref(db, 'wheel_trigger'), true); // الأمر الفعلي للدوران
        };

        window.resetFullMatch = () => {
            if(confirm("هل أنت متأكد؟ سيتم حذف نتائج المباراة الحالية!")) {
                set(ref(db, 'active_match'), null);
                set(ref(db, 'buzzer_winner'), "");
                set(ref(db, 'current_question'), null);
                location.reload();
            }
        };

        window.openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('tab-'+id).classList.add('active-tab');
        };

        loadQuestionsFromFile();
    </script>
</body>
</html>
