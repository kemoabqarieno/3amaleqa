<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم العمالقة - Control Center 🕹️</title>
    <style>
        @font-face { font-family: 'Galaxy'; src: url('جالاكسي.ttf'); }
        @font-face { font-family: 'Dahka'; src: url('ضحكه.ttf'); }

        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
        }

        body {
            background: var(--bg); color: white; font-family: sans-serif;
            margin: 0; padding: 20px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { font-family: 'Galaxy'; color: #facc15; margin-top: 0; border-bottom: 1px solid #334155; }

        label { display: block; margin: 10px 0 5px; color: #94a3b8; }
        select, input, textarea {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: #1e293b; color: white; font-size: 1rem; box-sizing: border-box;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn {
            padding: 15px; border: none; border-radius: 10px; cursor: pointer;
            font-family: 'Dahka'; font-size: 1.2rem; transition: 0.3s;
        }

        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .btn-gold { background: var(--warning); color: white; }

        .score-control { display: flex; align-items: center; justify-content: space-between; background: #000; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .score-val { font-size: 2rem; font-family: 'Dahka'; color: #facc15; }
    </style>
</head>
<body>

    <div class="card">
        <h2>إعدادات المباراة ⚔️</h2>
        <label>اختر فريق اليمين (A):</label>
        <select id="selectA"></select>
        
        <label>اختر فريق اليسار (B):</label>
        <select id="selectB"></select>
        
        <button class="btn btn-blue" style="width:100%; margin-top:15px;" onclick="startMatch()">بدء المباراة وتحديث الشاشات 🔄</button>

        <hr style="margin: 25px 0; border: 0.5px solid #334155;">
        
        <h2>لوحة الدرجات 📈</h2>
        <div class="score-control">
            <span id="labelA">فريق A</span>
            <button class="btn btn-red" onclick="changeScore('teamA', -5)">-</button>
            <span class="score-val" id="valA">0</span>
            <button class="btn btn-green" onclick="changeScore('teamA', 5)">+</button>
        </div>
        <div class="score-control" style="margin-top:15px;">
            <span id="labelB">فريق B</span>
            <button class="btn btn-red" onclick="changeScore('teamB', -5)">-</button>
            <span class="score-val" id="valB">0</span>
            <button class="btn btn-green" onclick="changeScore('teamB', 5)">+</button>
        </div>
    </div>

    <div class="card">
        <h2>التحكم اللحظي والأسئلة 🕹️</h2>
        
        <label>نص السؤال:</label>
        <textarea id="qText" rows="2" placeholder="اكتب السؤال هنا..."></textarea>
        <button class="btn btn-blue" style="width:100%;" onclick="sendQ()">إرسال السؤال للشاشة 🚀</button>

        <div class="btn-group">
            <button class="btn btn-green" onclick="setBuzzer('open')">فتح البازر ✅</button>
            <button class="btn btn-red" onclick="resetBuzzer()">قفل وتصفير ❌</button>
        </div>

        <div class="btn-group">
            <button class="btn btn-gold" onclick="setWheel('show')">إظهار العجلة 🎡</button>
            <button class="btn btn-blue" onclick="setWheel('hide')">إخفاء العجلة 📖</button>
        </div>

        <div style="margin-top:20px;">
            <label>المؤقت (ثانية):</label>
            <input type="number" id="timerIn" value="30">
            <button class="btn btn-blue" style="width:100%; margin-top:5px;" onclick="runTimer()">بدء التايمر ⏱️</button>
        </div>

        <div style="background:#000; padding:15px; border-radius:10px; margin-top:20px; border: 1px solid #facc15;">
            <p style="margin:0; color:#94a3b8;">الفائز بالبازر حالياً:</p>
            <h1 id="winnerName" style="font-family:'Dahka'; margin:5px 0; color:#facc15; text-align:center;">---</h1>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let teamsList = {};

        // 1. جلب الفرق من مسار teams اللي في صورتك
        onValue(ref(db, 'teams'), (snap) => {
            const data = snap.val();
            if(data) {
                teamsList = data;
                let options = '<option value="" disabled selected>اختر فريقاً</option>';
                for(let name in data) options += `<option value="${name}">${name}</option>`;
                document.getElementById('selectA').innerHTML = options;
                document.getElementById('selectB').innerHTML = options;
            }
        });

        // 2. بدء المباراة
        window.startMatch = function() {
            const a = document.getElementById('selectA').value;
            const b = document.getElementById('selectB').value;
            if(!a || !b || a===b) return alert("اختر فريقين مختلفين!");

            set(ref(db, 'active_match'), {
                teamA: { name: a, players: teamsList[a].players, score: 0 },
                teamB: { name: b, players: teamsList[b].players, score: 0 }
            });
            alert("تم إطلاق الماتش!");
        };

        // 3. تحديث الدرجات
        window.changeScore = function(teamKey, amount) {
            const scoreRef = ref(db, `active_match/${teamKey}/score`);
            onValue(scoreRef, (snap) => {
                const current = snap.val() || 0;
                set(scoreRef, current + amount);
            }, { onlyOnce: true });
        };

        // 4. البازر والأسئلة
        window.setBuzzer = (status) => set(ref(db, 'buzzer_status'), status);
        window.resetBuzzer = () => {
            set(ref(db, 'buzzer_status'), 'locked');
            set(ref(db, 'buzzer_winner'), "");
        };
        window.sendQ = () => set(ref(db, 'current_question'), { text: document.getElementById('qText').value });
        window.setWheel = (status) => set(ref(db, 'wheel_status'), status);

        // 5. التايمر
        window.runTimer = function() {
            let time = parseInt(document.getElementById('timerIn').value);
            let interval = setInterval(() => {
                set(ref(db, 'timer_value'), time);
                if(time <= 0) clearInterval(interval);
                time--;
            }, 1000);
        };

        // 6. مراقبة الفائز ودرجات الفريقين في الأدمن
        onValue(ref(db, 'buzzer_winner'), (snap) => {
            document.getElementById('winnerName').innerText = snap.val() ? snap.val().name : "---";
        });
        onValue(ref(db, 'active_match'), (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('labelA').innerText = data.teamA.name;
                document.getElementById('labelB').innerText = data.teamB.name;
                document.getElementById('valA').innerText = data.teamA.score;
                document.getElementById('valB').innerText = data.teamB.score;
            }
        });
    </script>
</body>
</html>
