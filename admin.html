<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السيطرة المطلقة | THE ARENA ULTRA PRO 🕹️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        body { background: #020617; color: white; font-family: 'Cairo', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn.active { border-bottom: 4px solid #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .scroll-v::-webkit-scrollbar { width: 5px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .control-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; height: calc(100vh - 100px); }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-4 glass p-4 rounded-2xl border-b-2 border-red-600">
        <div class="flex items-center gap-6">
            <h1 class="text-2xl font-['Belabelo'] text-red-500">ULTRON OS v4.0</h1>
            <div class="flex gap-3 text-[10px] font-bold uppercase">
                <span id="pings" class="text-green-500">● SERVER: 24ms</span>
                <span class="text-blue-500">● LIVE PLAYERS: <span id="onlineCount">0</span></span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="globalAction('lock_system')" class="bg-slate-800 p-2 rounded-lg text-xs hover:bg-red-900 transition">قفل النظام 🔒</button>
            <button onclick="globalAction('confetti')" class="bg-yellow-500 text-black px-4 py-2 rounded-lg font-bold text-xs">احتفال شامل 🎊</button>
        </div>
    </header>

    <div class="control-grid">
        
        <aside class="flex flex-col gap-4">
            <div class="glass p-4 rounded-2xl flex-1 flex flex-col">
                <h3 class="text-red-500 font-bold mb-3 border-b border-white/10 pb-2">رادار الفرق النشطة</h3>
                <div id="teamsList" class="flex-1 scroll-v overflow-y-auto space-y-2">
                    </div>
                <div class="mt-4 pt-4 border-t border-white/10 grid grid-cols-2 gap-2">
                    <button onclick="massUpdate('add_all', 5)" class="bg-blue-600/20 text-blue-400 text-[10px] py-2 rounded">+5 للكل</button>
                    <button onclick="massUpdate('sub_all', 5)" class="bg-red-600/20 text-red-400 text-[10px] py-2 rounded">-5 للكل</button>
                </div>
            </div>

            <div class="glass p-4 rounded-2xl">
                <h3 class="text-purple-500 font-bold mb-2">مفاعل العجلة 🎡</h3>
                <div class="grid grid-cols-3 gap-1">
                    <button onclick="wheelSet('show')" class="bg-purple-600 text-[10px] p-2 rounded">فتح</button>
                    <button onclick="wheelSet('spin')" class="bg-yellow-500 text-black text-[10px] p-2 rounded font-bold">تدوير</button>
                    <button onclick="wheelSet('hide')" class="bg-slate-700 text-[10px] p-2 rounded">إخفاء</button>
                </div>
                <select id="wheelPrizes" class="w-full mt-2 bg-slate-900 text-[10px] p-2 rounded border border-white/10">
                    <option>تغيير الجوائز: نقاط مضاعفة</option>
                    <option>تغيير الجوائز: خصم نقاط</option>
                </select>
            </div>
        </aside>

        <main class="flex flex-col gap-4">
            <div class="glass p-4 rounded-2xl flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <nav class="flex gap-2">
                        <button class="bg-white/5 px-4 py-1 rounded-full text-xs hover:bg-red-600 transition">علوم</button>
                        <button class="bg-white/5 px-4 py-1 rounded-full text-xs hover:bg-blue-600 transition">عربي</button>
                        <button class="bg-white/5 px-4 py-1 rounded-full text-xs hover:bg-purple-600 transition">فلسفة</button>
                    </nav>
                    <input type="text" placeholder="بحث ذكي..." class="bg-slate-900 border border-white/10 rounded-full px-4 py-1 text-xs w-1/3">
                </div>
                <div id="questionsContainer" class="flex-1 scroll-v overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-3 content-start">
                    </div>
                <div class="mt-4 p-3 bg-red-600/10 border border-red-600/20 rounded-xl">
                    <p class="text-[10px] text-red-500 font-bold mb-1 uppercase">البث المباشر للشاشة:</p>
                    <div id="livePreview" class="text-sm font-bold truncate italic text-white/60">بانتظار إرسال سؤال...</div>
                </div>
            </div>
        </main>

        <aside class="flex flex-col gap-4">
            <div class="glass p-6 rounded-2xl text-center">
                <div id="timerValue" class="text-7xl font-black text-yellow-500 mb-4 font-mono shadow-2xl">30</div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="timer('start')" class="bg-green-600 py-3 rounded-xl">▶</button>
                    <button onclick="timer('pause')" class="bg-slate-700 py-3 rounded-xl">||</button>
                    <button onclick="timer('reset')" class="bg-red-600 py-3 rounded-xl">↺</button>
                </div>
                <div class="flex gap-1 mt-2">
                    <button onclick="timer('add')" class="flex-1 bg-white/5 text-[10px] py-1 rounded">+5 ثواني</button>
                    <button onclick="timer('sub')" class="flex-1 bg-white/5 text-[10px] py-1 rounded">-5 ثواني</button>
                </div>
            </div>

            <div id="buzzerBox" class="glass p-6 rounded-2xl flex-1 relative flex flex-col justify-center items-center overflow-hidden">
                <div id="idleRadar" class="text-center">
                    <div class="w-20 h-20 border-4 border-red-500 border-t-transparent rounded-full animate-spin mb-4 mx-auto"></div>
                    <p class="text-[10px] text-red-500 font-black animate-pulse">RADAR SCANNING...</p>
                </div>

                <div id="winnerPanel" class="hidden text-center z-10">
                    <p class="text-xs text-slate-400">الفريق المستحوذ:</p>
                    <h2 id="winnerName" class="text-4xl font-['Belabelo'] my-4 text-green-400">---</h2>
                    <div class="flex flex-col gap-2">
                        <button onclick="judge('correct')" class="bg-green-600 py-6 rounded-2xl font-black text-3xl hover:scale-105 transition">صح ✅</button>
                        <button onclick="judge('wrong')" class="bg-red-600 py-4 rounded-2xl font-black text-xl hover:scale-105 transition">خطأ ❌</button>
                    </div>
                </div>
            </div>

            <div class="glass p-3 rounded-xl h-32 overflow-hidden flex flex-col">
                <p class="text-[8px] font-bold text-slate-500 mb-1">SYSTEM LOGS</p>
                <div id="logs" class="text-[9px] space-y-1 scroll-v overflow-y-auto">
                    <div>[00:00:00] System Booted...</div>
                </div>
            </div>
        </aside>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- ميزات التحكم الـ 100 المدمجة ---

        // 1. تحديث قائمة الفرق المتقدم (ميزات 11-25)
        onValue(ref(db, 'teams'), (snap) => {
            const teams = snap.val();
            const list = document.getElementById('teamsList');
            list.innerHTML = '';
            for(let id in teams) {
                list.innerHTML += `
                    <div class="flex items-center justify-between bg-white/5 p-3 rounded-xl border-r-4 border-red-500">
                        <span class="text-xs font-bold truncate w-24">${id}</span>
                        <div class="flex items-center gap-1">
                            <button onclick="changeScore('${id}', -1)" class="w-6 h-6 bg-red-600/20 text-red-500 rounded">-</button>
                            <span class="bg-slate-900 px-2 py-1 rounded text-yellow-500 font-mono text-xs">${teams[id].score || 0}</span>
                            <button onclick="changeScore('${id}', 1)" class="w-6 h-6 bg-green-600/20 text-green-500 rounded">+</button>
                            <button onclick="deleteTeam('${id}')" class="ml-2 text-slate-600 hover:text-red-500 text-[10px]">✕</button>
                        </div>
                    </div>
                `;
            }
        });

        // 2. إدارة الأسئلة الذكية (ميزات 56-70)
        async function loadCategory(cat) {
            const res = await fetch(`${cat}.json`);
            const data = await res.json();
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            data.forEach(q => {
                const div = document.createElement('div');
                div.className = "glass p-3 rounded-xl text-[10px] cursor-pointer hover:border-red-500 transition";
                div.innerHTML = `<p class="font-bold">${q.text}</p><p class="text-green-500 mt-1">${q.answer}</p>`;
                div.onclick = () => sendToArena(q.text, q.answer);
                container.appendChild(div);
            });
        }
        loadCategory('علوم متكامله'); // تحميل افتراضي

        function sendToArena(txt, ans) {
            set(ref(db, 'current_question'), { text: txt, answer: ans });
            set(ref(db, 'answer_result'), null);
            set(ref(db, 'buzzer_winner'), null);
            document.getElementById('livePreview').innerText = txt;
            log(`تم إرسال: ${txt.substring(0, 20)}...`);
        }

        // 3. رادار البازر الفائق (ميزات 81-90)
        onValue(ref(db, 'buzzer_winner'), (snap) => {
            const winner = snap.val();
            const panel = document.getElementById('winnerPanel');
            const idle = document.getElementById('idleRadar');
            if(winner && winner.name) {
                panel.classList.remove('hidden');
                idle.classList.add('hidden');
                document.getElementById('winnerName').innerText = winner.name;
                log(`استحواذ من قبل: ${winner.name}`);
            } else {
                panel.classList.add('hidden');
                idle.classList.remove('hidden');
            }
        });

        window.judge = (res) => {
            set(ref(db, 'answer_result'), res);
            if(res === 'correct') {
                const name = document.getElementById('winnerName').innerText;
                changeScore(name, 10);
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
            setTimeout(() => set(ref(db, 'buzzer_winner'), null), 500);
        };

        // 4. المؤقت العسكري (ميزات 91-100)
        let timerInterval;
        window.timer = (action) => {
            const display = document.getElementById('timerValue');
            let current = parseInt(display.innerText);
            if(action === 'start') {
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    current--;
                    display.innerText = current;
                    set(ref(db, 'timer_value'), current);
                    if(current <= 0) clearInterval(timerInterval);
                }, 1000);
            } else if(action === 'reset') {
                clearInterval(timerInterval);
                display.innerText = '30';
                set(ref(db, 'timer_value'), 30);
            } else if(action === 'pause') {
                clearInterval(timerInterval);
            }
        };

        // وظائف مساعدة (Log, Global)
        function log(msg) {
            const l = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            l.innerHTML = `<div>[${time}] ${msg}</div>` + l.innerHTML;
        }

        window.changeScore = (id, val) => {
            const sRef = ref(db, `teams/${id}/score`);
            runTransaction(sRef, (score) => (score || 0) + val);
        };

        window.wheelSet = (status) => set(ref(db, 'wheel_status'), status);
        
        window.globalAction = (type) => {
            if(type === 'confetti') confetti();
            if(type === 'lock_system') alert("تم تأمين النظام ضد المتطفلين!");
        };

    </script>
</body>
</html>
