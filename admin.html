<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>القيادة المركزية | THE ARENA PRO 🕹️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        body { background: #020617; color: white; font-family: 'Cairo', sans-serif; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .stat-card:hover { border-color: #ef4444; transform: translateY(-5px); }
        .btn-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-center mb-8 bg-slate-900 p-6 rounded-3xl border-b-4 border-red-600">
        <div>
            <h1 class="text-4xl font-['Belabelo'] text-red-500">غرفة العمليات - إصدار العمالقة v2.0</h1>
            <p class="text-slate-400">تحكم كامل في الساحة، العجلة، والبازرات</p>
        </div>
        <div class="flex gap-4">
            <button onclick="triggerConfetti()" class="bg-yellow-500 text-black px-6 py-2 rounded-full font-bold">احتفال 🎊</button>
            <div class="bg-green-500/20 text-green-400 px-4 py-2 rounded-full border border-green-500/50 animate-pulse">LIVE SYSTEM</div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="stat-card p-6 rounded-3xl">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="text-red-500">●</span> الفرق النشطة</h2>
                <div id="activeMatchUI" class="grid grid-cols-2 gap-4">
                    </div>
            </div>

            <div class="stat-card p-6 rounded-3xl">
                <div class="flex justify-between mb-4">
                    <h2 class="text-xl font-bold">بنك الأسئلة الذكي</h2>
                    <select id="folderSelect" class="bg-slate-800 border-none rounded-lg px-4 py-2" onchange="loadCategory()">
                        <option value="علوم متكامله">علوم</option>
                        <option value="عربي">لغة عربية</option>
                        <option value="فلسفه و منطق">فلسفة</option>
                    </select>
                </div>
                <div id="questionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-96 overflow-y-auto"></div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="stat-card p-6 rounded-3xl border-t-4 border-yellow-500">
                <h2 class="text-center text-2xl font-bold mb-4">المؤقت المركزي</h2>
                <div id="timerDisplay" class="text-7xl text-center font-black text-yellow-500 mb-6 font-mono">00:30</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="timerCtrl('start')" class="bg-green-600 p-4 rounded-xl font-bold">ابدأ الهجوم</button>
                    <button onclick="timerCtrl('pause')" class="bg-slate-700 p-4 rounded-xl font-bold">إيقاف</button>
                    <button onclick="timerCtrl('reset')" class="bg-red-600/20 text-red-500 p-4 rounded-xl font-bold col-span-2">إعادة تعيين</button>
                </div>
            </div>

            <div class="stat-card p-6 rounded-3xl border-t-4 border-purple-500">
                <h2 class="text-xl font-bold mb-4">تحكم العجلة 🎡</h2>
                <div class="flex flex-col gap-2">
                    <button onclick="wheelCtrl('show')" class="bg-purple-600 p-3 rounded-xl font-bold">إظهار العجلة للكل</button>
                    <button onclick="wheelCtrl('spin')" class="bg-yellow-500 text-black p-3 rounded-xl font-bold">تدوير الآن!</button>
                    <button onclick="wheelCtrl('hide')" class="bg-slate-700 p-3 rounded-xl font-bold">إخفاء</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // كود الربط الموحد مع Firebase (نفس الإعدادات السابقة)
        // إضافة وظائف الـ 50 ميزة برمجياً هنا...
    </script>
</body>
</html>
