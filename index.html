<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساحة العمالقة | The Arena 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face { font-family: 'Amira'; src: url('اميرة.ttf'); }
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'Dahka'; src: url('ضحكه.ttf'); }
        @font-face { font-family: 'DGRawnaq'; src: url('دي جي راونق.ttf'); }

        :root {
            --neon-red: #ff003c;
            --neon-gold: #facc15;
            --bg-dark: #020617;
        }

        body {
            background: radial-gradient(circle at center, #0f172a 0%, var(--bg-dark) 100%);
            color: white; overflow: hidden; height: 100vh; margin: 0;
            font-family: sans-serif;
        }

        /* حاويات الفرق الجانبية */
        .team-panel {
            height: 100vh; width: 22%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(20px);
            border-left: 2px solid rgba(255, 0, 60, 0.1); border-right: 2px solid rgba(255, 0, 60, 0.1);
            position: relative; z-index: 10;
        }
        .team-a { border-left: 8px solid var(--neon-red); box-shadow: 20px 0 50px rgba(255, 0, 60, 0.1); }
        .team-b { border-right: 8px solid #3b82f6; box-shadow: -20px 0 50px rgba(59, 130, 246, 0.1); }

        .team-name { font-family: 'Belabelo'; font-size: 3.5rem; text-align: center; margin-bottom: 20px; }
        .team-score { font-family: 'Dahka'; font-size: 8rem; color: var(--neon-gold); text-shadow: 0 0 30px rgba(250, 204, 21, 0.5); }

        /* المنطقة الوسطى */
        .main-stage {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 40px 0; position: relative;
        }

        /* التايمر الدائري */
        .timer-container { position: relative; width: 220px; height: 220px; }
        .timer-svg { transform: rotate(-90deg); width: 220px; height: 220px; }
        .timer-circle {
            fill: none; stroke: var(--neon-gold); stroke-width: 10;
            stroke-dasharray: 565; stroke-dashoffset: 0;
            transition: 1s linear; filter: drop-shadow(0 0 10px var(--neon-gold));
        }
        #timer-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'DGRawnaq'; font-size: 4.5rem; color: var(--neon-gold);
        }

        /* صندوق السؤال */
        .question-card {
            width: 90%; min-height: 350px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px; display: flex; align-items: center; justify-content: center;
            padding: 50px; text-align: center; position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        #q-text { font-family: 'Amira'; font-size: 4.5rem; line-height: 1.3; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* تنبيه البازر */
        #buzzer-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 60, 0.2); display: none;
            justify-content: center; align-items: center; z-index: 100;
            animation: pulse-bg 1s infinite;
        }
        .winner-tag {
            background: var(--neon-gold); color: black; padding: 20px 60px;
            border-radius: 100px; font-family: 'Dahka'; font-size: 4rem;
            box-shadow: 0 0 50px var(--neon-gold); transform: translateY(-50px);
        }

        @keyframes pulse-bg { 0% { opacity: 0.3; } 50% { opacity: 0.6; } 100% { opacity: 0.3; } }
        
        /* عجلة الحظ (تظهر وتختفي) */
        #wheel-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200; display: none;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="flex">

    <div class="team-panel team-a">
        <div class="team-name" id="nameA">الفريق الأول</div>
        <div class="team-score" id="scoreA">00</div>
    </div>

    <div class="main-stage">
        <div class="timer-container">
            <svg class="timer-svg" viewBox="0 0 200 200">
                <circle class="timer-circle" id="circleProgress" cx="100" cy="100" r="90"></circle>
            </svg>
            <div id="timer-text">30</div>
        </div>

        <div class="question-card">
            <h1 id="q-text">في انتظار انطلاق العمالقة...</h1>
            <div id="buzzer-overlay">
                <div class="winner-tag" id="winner-display">اسم اللاعب</div>
            </div>
        </div>

        <div id="answer-box" class="opacity-0 transition-all duration-700 bg-green-600/20 border border-green-500 p-6 rounded-2xl">
            <p class="text-green-400 font-bold text-center">الإجابة: <span id="actual-answer" class="text-3xl text-white">---</span></p>
        </div>
    </div>

    <div class="team-panel team-b">
        <div class="team-name" id="nameB">الفريق الثاني</div>
        <div class="team-score" id="scoreB">00</div>
    </div>

    <div id="wheel-layer">
        <iframe src="wheel.html" frameborder="0" style="width: 80%; height: 80%;"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. مراقبة المباراة والنتائج
        onValue(ref(db, 'active_match'), (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('nameA').innerText = data.teamA.name;
                document.getElementById('scoreA').innerText = data.teamA.score < 10 ? '0'+data.teamA.score : data.teamA.score;
                document.getElementById('nameB').innerText = data.teamB.name;
                document.getElementById('scoreB').innerText = data.teamB.score < 10 ? '0'+data.teamB.score : data.teamB.score;
            }
        });

        // 2. مراقبة السؤال والتايمر
        onValue(ref(db, 'current_question'), (snap) => {
            if(snap.val()) {
                document.getElementById('q-text').innerText = snap.val().text;
                document.getElementById('actual-answer').innerText = snap.val().answer;
            }
        });

        onValue(ref(db, 'timer_value'), (snap) => {
            const time = snap.val() || 0;
            document.getElementById('timer-text').innerText = time;
            const offset = 565 - (time / 30) * 565;
            document.getElementById('circleProgress').style.strokeDashoffset = offset;
            
            // لو الوقت خلص خلي اللون أحمر
            document.getElementById('circleProgress').style.stroke = time <= 5 ? '#ff003c' : '#facc15';
        });

        // 3. مراقبة البازر (اللحظة الحاسمة)
        onValue(ref(db, 'buzzer_winner'), (snap) => {
            const winner = snap.val();
            const overlay = document.getElementById('buzzer-overlay');
            if(winner && winner.name) {
                document.getElementById('winner-display').innerText = winner.name;
                overlay.style.display = 'flex';
                // تغيير لون التنبيه حسب فريق اللاعب
                const teamA = document.getElementById('nameA').innerText;
                overlay.style.background = (winner.team === teamA) ? 'rgba(255, 0, 60, 0.4)' : 'rgba(59, 130, 246, 0.4)';
            } else {
                overlay.style.display = 'none';
            }
        });

        // 4. كشف الإجابة والعجلة
        onValue(ref(db, 'show_answer'), (snap) => {
            document.getElementById('answer-box').style.opacity = snap.val() ? '1' : '0';
        });

        onValue(ref(db, 'wheel_status'), (snap) => {
            document.getElementById('wheel-layer').style.display = (snap.val() === 'show') ? 'flex' : 'none';
        });

    </script>
</body>
</html>
