<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساحة العمالقة | The Arena 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* استيراد الخطوط كما في لوحة التحكم */
        @font-face { font-family: 'Amira'; src: url('اميرة.ttf'); }
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'DGRawnaq'; src: url('دي جي راونق.ttf'); }
        @font-face { font-family: 'Galaxy'; src: url('جالاكسي.ttf'); }

        :root {
            --neon-red: #ff003c;
            --neon-gold: #facc15;
            --neon-blue: #3b82f6;
            --bg-dark: #020617;
        }

        body {
            background: radial-gradient(circle at center, #0f172a 0%, var(--bg-dark) 100%);
            color: white; overflow: hidden; height: 100vh; margin: 0;
            font-family: 'Cairo', sans-serif;
        }

        /* خلفية متحركة خفيفة */
        .bg-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* حاويات الفرق الجانبية */
        .team-panel {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 300px; padding: 40px 20px;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 0 40px 40px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .team-panel.left { left: 0; border-left: 0; border-right: 8px solid var(--neon-red); }
        .team-panel.right { right: 0; border-right: 0; border-left: 8px solid var(--neon-blue); border-radius: 40px 0 0 40px; }

        .score-val {
            font-family: 'DGRawnaq', sans-serif;
            font-size: 5rem; line-height: 1;
            text-shadow: 0 0 30px currentColor;
        }

        /* السؤال المركزي */
        .question-zone {
            max-width: 900px; margin: 0 auto;
            padding-top: 10vh; text-align: center;
        }

        .q-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* مفاعل الوقت (The Reactor) */
        .timer-reactor {
            width: 220px; height: 220px;
            margin: 40px auto; position: relative;
            display: flex; items-center: center; justify-content: center;
        }
        .timer-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .timer-circle {
            fill: none; stroke: var(--neon-gold); stroke-width: 10;
            stroke-dasharray: 565; transition: 1s linear;
            filter: drop-shadow(0 0 10px var(--neon-gold));
        }

        /* تنبيه البازر (The Strike Overlay) */
        #buzzer-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            animation: fadeIn 0.3s forwards;
        }

        .strike-title {
            font-family: 'Galaxy', sans-serif;
            font-size: 8rem; color: var(--neon-red);
            text-shadow: 0 0 50px var(--neon-red);
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .answer-box {
            margin-top: 30px; padding: 20px 50px;
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid #22c55e; border-radius: 20px;
            color: #4ade80; font-size: 2.5rem; font-weight: 900;
            opacity: 0; transform: scale(0.8); transition: 0.5s;
        }

        /* العجلة */
        #wheel-frame {
            position: fixed; inset: 0; z-index: 50;
            background: rgba(2, 6, 23, 0.9);
            display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="team-panel left" id="panelA">
        <p class="text-red-500 font-black tracking-widest text-xs mb-2">OPERATIVE TEAM</p>
        <h2 id="nameA" class="text-4xl font-black text-white mb-6" style="font-family: 'Belabelo';">في انتظارك..</h2>
        <div id="scoreA" class="score-val text-red-500">00</div>
    </div>

    <div class="team-panel right" id="panelB">
        <p class="text-blue-400 font-black tracking-widest text-xs mb-2">STRIKE TEAM</p>
        <h2 id="nameB" class="text-4xl font-black text-white mb-6" style="font-family: 'Belabelo';">في انتظارك..</h2>
        <div id="scoreB" class="score-val text-blue-400">00</div>
    </div>

    <main class="question-zone">
        <div class="inline-block px-6 py-2 bg-yellow-500/10 border border-yellow-500/50 rounded-full text-yellow-500 font-black text-sm mb-6">
            MIND WARRIORS CHALLENGE ⚔️
        </div>
        
        <div class="q-card">
            <p id="question-text" class="text-4xl md:text-5xl font-black leading-tight text-white font-['Amira']">
                بانتظار إطلاق السؤال من غرفة العمليات...
            </p>
        </div>

        <div class="timer-reactor">
            <svg class="timer-svg" viewBox="0 0 200 200">
                <circle class="timer-circle" id="circleProgress" cx="100" cy="100" r="90"></circle>
            </svg>
            <div id="timer-text" class="absolute inset-0 flex items-center justify-center text-6xl font-black text-yellow-400 font-['DGRawnaq']">
                30
            </div>
        </div>

        <div id="answer-box" class="answer-box mx-auto inline-block">
            <span class="text-lg block text-white/50 font-bold mb-1">الإجابة الصحيحة هي:</span>
            <span id="final-answer">---</span>
        </div>
    </main>

    <div id="buzzer-overlay">
        <div class="strike-title">STRIKE!</div>
        <div class="flex items-center gap-8 bg-white/5 p-10 rounded-[3rem] border-2 border-white/10 backdrop-blur-xl">
            <img id="winner-img" src="" class="w-48 h-48 rounded-full border-8 border-yellow-500">
            <div class="text-right">
                <p class="text-2xl text-yellow-500 font-bold mb-2">البطل القادم:</p>
                <h1 id="winner-name" class="text-7xl font-black text-white" style="font-family: 'Belabelo';">---</h1>
                <p id="winner-team-label" class="text-3xl text-white/60 mt-2">فريق العمالقة</p>
            </div>
        </div>
        <p class="mt-10 text-white/40 animate-pulse text-xl">توقف الوقت! بانتظار قرار التحكيم...</p>
    </div>

    <div id="wheel-frame">
        <iframe src="wheel.html" class="w-full h-full border-none"></iframe>
    </div>

    <audio id="buzzSound" src="https://assets.mixkit.co/active_storage/sfx/2959/2959-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. مراقبة المباراة والنتائج
        onValue(ref(db, 'active_match'), (snap) => {
            const match = snap.val();
            if(match) {
                document.getElementById('nameA').innerText = match.teamA.name;
                document.getElementById('scoreA').innerText = match.teamA.score.toString().padStart(2, '0');
                document.getElementById('nameB').innerText = match.teamB.name;
                document.getElementById('scoreB').innerText = match.teamB.score.toString().padStart(2, '0');
            }
        });

        // 2. مراقبة السؤال
        onValue(ref(db, 'current_question'), (snap) => {
            const q = snap.val();
            if(q) {
                document.getElementById('question-text').innerText = q.text;
                document.getElementById('final-answer').innerText = q.answer;
                // إعادة تصفير وضع الإجابة
                document.getElementById('answer-box').style.opacity = "0";
                document.getElementById('answer-box').style.transform = "scale(0.8)";
            }
        });

        // 3. مراقبة الوقت
        let totalTime = 30;
        onValue(ref(db, 'timer_total_ref'), (snap) => { totalTime = snap.val() || 30; });

        onValue(ref(db, 'timer_value'), (snap) => {
            const time = snap.val() || 0;
            document.getElementById('timer-text').innerText = time;
            const offset = 565 - (time / totalTime) * 565;
            const circle = document.getElementById('circleProgress');
            circle.style.strokeDashoffset = offset;
            
            // تغيير اللون عند الخطر
            circle.style.stroke = time <= 5 ? '#ff003c' : '#facc15';
            circle.style.filter = `drop-shadow(0 0 15px ${time <= 5 ? '#ff003c' : '#facc15'})`;
        });

        // 4. اللحظة الحاسمة: البازر
        onValue(ref(db, 'buzzer_winner'), (snap) => {
            const winner = snap.val();
            const overlay = document.getElementById('buzzer-overlay');
            if(winner && winner.name) {
                document.getElementById('winner-name').innerText = winner.name;
                document.getElementById('winner-team-label').innerText = winner.team;
                document.getElementById('winner-img').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${winner.name}`;
                overlay.style.display = 'flex';
                document.getElementById('buzzSound').play();
            } else {
                overlay.style.display = 'none';
            }
        });

        // 5. كشف الإجابة والعجلة
        onValue(ref(db, 'show_answer'), (snap) => {
            if(snap.val() === true) {
                document.getElementById('answer-box').style.opacity = "1";
                document.getElementById('answer-box').style.transform = "scale(1)";
            }
        });

        onValue(ref(db, 'wheel_status'), (snap) => {
            document.getElementById('wheel-frame').style.display = (snap.val() === 'show') ? 'flex' : 'none';
        });
    </script>
</body>
</html>
