<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ساحة العمالقة - Arena 🏆</title>
    <style>
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'Galaxy'; src: url('جالاكسي.ttf'); }
        @font-face { font-family: 'Dahka'; src: url('ضحكه.ttf'); }
        @font-face { font-family: 'Amira'; src: url('اميرة.ttf'); }

        :root {
            --bg: #020617;
            --neon-blue: #0ea5e9;
            --neon-pink: #d946ef;
            --gold: #facc15;
        }

        body {
            margin: 0; background: var(--bg); color: white; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-image: linear-gradient(to bottom, #020617, #0f172a);
        }

        /* توزيعة الملعب */
        .game-arena {
            display: flex; justify-content: space-between; align-items: stretch;
            height: 100vh; padding: 20px; box-sizing: border-box;
        }

        /* الفرق الجانبية */
        .team-box {
            width: 250px; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(255,255,255,0.03); border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .team-right { border-right: 8px solid var(--neon-blue); }
        .team-left { border-left: 8px solid var(--neon-pink); }

        .team-name { font-family: 'Belabelo'; font-size: 3rem; text-align: center; margin-bottom: 20px; }
        .team-score { font-family: 'Dahka'; font-size: 6rem; color: var(--gold); }

        /* منطقة المنتصف */
        .center-stage {
            flex: 1; margin: 0 40px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
        }

        #timer {
            font-family: 'Dahka'; font-size: 5rem; color: var(--gold);
            background: rgba(0,0,0,0.5); padding: 10px 40px; border-radius: 50px;
            margin-bottom: 20px; border: 2px solid var(--gold);
        }

        .question-card {
            width: 100%; min-height: 300px; background: rgba(255,255,255,0.05);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center;
            padding: 40px; box-sizing: border-box; transition: 0.5s;
        }

        #question-text {
            font-family: 'Amira'; font-size: 4.5rem; text-align: center; line-height: 1.1;
        }

        /* من يجاوب الآن */
        .answer-bar {
            margin-top: 30px; width: 80%; height: 80px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            display: none; justify-content: center; align-items: center;
            border-radius: 40px; animation: glow 1s infinite alternate;
        }
        #winner-name { font-family: 'Dahka'; font-size: 3rem; color: black; }

        /* عجلة الحظ المخفية */
        #wheel-zone {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 500px; height: 500px;
            background: url('wheel.png') no-repeat center/contain; /* حط صورة العجلة هنا */
            animation: spin 10s linear infinite;
        }

        @keyframes glow { from { opacity: 0.6; } to { opacity: 1; } }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="game-arena">
        <div class="team-box team-right">
            <div class="team-name" id="nameA">الفريق A</div>
            <div class="team-score" id="scoreA">0</div>
        </div>

        <div class="center-stage">
            <div id="timer">30</div>
            
            <div class="question-card" id="qCard">
                <h1 id="question-text">بانتظار السؤال...</h1>
            </div>

            <div id="wheel-zone"></div>

            <div class="answer-bar" id="answerBar">
                <span id="winner-name">اللاعب يجاوب...</span>
            </div>
        </div>

        <div class="team-box team-left">
            <div class="team-name" id="nameB">الفريق B</div>
            <div class="team-score" id="scoreB">0</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. تحديث الماتش (أسماء ودرجات)
        onValue(ref(db, 'active_match'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('nameA').innerText = data.teamA.name;
                document.getElementById('nameB').innerText = data.teamB.name;
                // الدرجات لو متخزنة في active_match أو teams
                document.getElementById('scoreA').innerText = data.teamA.score || 0;
                document.getElementById('scoreB').innerText = data.teamB.score || 0;
            }
        });

        // 2. تحديث السؤال
        onValue(ref(db, 'current_question'), (snapshot) => {
            const q = snapshot.val();
            if(q) document.getElementById('question-text').innerText = q.text;
        });

        // 3. تحديث التايمر
        onValue(ref(db, 'timer_value'), (snapshot) => {
            document.getElementById('timer').innerText = snapshot.val() || 30;
        });

        // 4. نظام "من يجاوب؟"
        onValue(ref(db, 'buzzer_winner'), (snapshot) => {
            const winner = snapshot.val();
            const bar = document.getElementById('answerBar');
            if (winner && winner.name) {
                document.getElementById('winner-name').innerText = winner.name;
                bar.style.display = 'flex';
            } else {
                bar.style.display = 'none';
            }
        });

        // 5. إظهار/إخفاء عجلة الحظ
        onValue(ref(db, 'wheel_status'), (snapshot) => {
            const status = snapshot.val();
            const qCard = document.getElementById('qCard');
            const wheel = document.getElementById('wheel-zone');
            if(status === "show") {
                qCard.style.opacity = '0';
                wheel.style.display = 'block';
            } else {
                qCard.style.opacity = '1';
                wheel.style.display = 'none';
            }
        });

    </script>
</body>
</html>
