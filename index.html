<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة عمليات العمالقة - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* تعريف الخطوط */ 
        @font-face {  
            font-family: 'Amira'; 
            src: url('اميرة.ttf') format('truetype'); 
            font-display: swap;
        }
        @font-face { 
            font-family: 'Belabelo'; 
            src: url('بلابيلو.ttf') format('truetype'); 
            font-display: swap;
        }
        @font-face {
            font-family: 'DGRawnaq';
            src: url('دي جي راونق.ttf');
        }

        :root {
            --neon-cyan: #00d4ff;
            --neon-purple: #8a2be2;
            --neon-red: #ff003c;
            --neon-green: #39ff14;
            --neon-yellow: #fde047;
            --bg-dark: #070b14;
        }

        /* تطبيق الخطوط المخصصة */
        .main-title {
            font-family: 'Amira', sans-serif;
            color: #facc15;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        #timerDisplay {
            font-family: 'DGRawnaq', sans-serif;
            color: var(--neon-yellow);
        }

        .team-names, select, option {
            font-family: 'Belabelo', sans-serif;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: radial-gradient(circle at center, #101827 0%, #070b14 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* خلفية هادئة */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            z-index: 100;
            pointer-events: none;
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 212, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        /* زوايا تقنية */
        .cyber-corners::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; width: 20px; height: 20px;
            border-top: 3px solid var(--neon-cyan);
            border-left: 3px solid var(--neon-cyan);
        }
        .cyber-corners::after {
            content: "";
            position: absolute;
            bottom: -2px; right: -2px; width: 20px; height: 20px;
            border-bottom: 3px solid var(--neon-cyan);
            border-right: 3px solid var(--neon-cyan);
        }

        /* تأثير الجليتش */
        .glitch-text {
            position: relative;
        }

        .glass::after {
            content: "";
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 212, 255, 0.05), transparent);
            display: none;
        }

        .neon-border-cyan { 
            border: 1px solid rgba(0, 212, 255, 0.3); 
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .active-tab { 
            border-bottom: 4px solid var(--neon-cyan); 
            color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .btn-neon {
            transition: all 0.2s ease-out;
            position: relative;
            border: 1px solid transparent;
        }
        .btn-neon:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 0 20px currentColor; }
        .btn-neon:active { transform: scale(0.98); }

        /* شبكة الفرق */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        .team-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .team-card.selected {
            border-color: var(--neon-yellow);
            background: rgba(250, 204, 21, 0.15);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
        }

        /* وضع الثبات والقوة عند التنبيه */
        .shake-heavy {
            border: 3px solid var(--neon-red) !important;
            background: rgba(255, 0, 60, 0.15) !important;
            box-shadow: 0 0 40px rgba(255, 0, 60, 0.3);
        }

        .war-label { letter-spacing: 2px; font-weight: 900; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
        .timer-glow { text-shadow: 0 0 40px rgba(250, 204, 21, 0.4); }
        
        select { appearance: none; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-10 select-none">

    <header class="flex justify-between items-center mb-6 glass p-6 rounded-xl neon-border-cyan cyber-corners">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-gradient-to-tr from-cyan-600 to-blue-800 rounded-xl shadow-lg border border-white/20 flex items-center justify-center">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h1 class="main-title text-5xl">غرفة العمليات</h1>
        </div>
        <div id="status" class="flex items-center gap-3 text-sm font-bold bg-green-500/10 text-green-400 border border-green-500/30 px-5 py-2 rounded-lg tracking-widest">
            <span class="w-2 h-2 bg-green-500 rounded-full"></span>
            رادار العمالقة نشط
        </div>
    </header>

    <nav class="flex justify-center gap-4 mb-8">
        <button onclick="openTab('live')" id="tab-live" class="tab-btn pb-3 px-6 font-bold active-tab flex items-center gap-2 text-lg">البث المباشر</button>
        <button onclick="openTab('radar')" id="tab-radar" class="tab-btn pb-3 px-6 font-bold text-gray-500 flex items-center gap-2 text-lg">رادار الفرق</button>
        <button onclick="openTab('judge')" id="tab-judge" class="tab-btn pb-3 px-6 font-bold text-gray-500 flex items-center gap-2 text-lg">التحكيم</button>
        <button onclick="openTab('stats')" id="tab-stats" class="tab-btn pb-3 px-6 font-bold text-gray-500 flex items-center gap-2 text-lg">رجل المباراة</button>
    </nav>

    <section id="live" class="tab-content active space-y-6">
        <div class="glass p-8 rounded-xl text-center border-2 border-yellow-500/20 cyber-corners">
            <h3 class="war-label mb-4">المؤقت التكتيكي</h3>
            <div class="timer-glow text-9xl font-black mb-8" id="timerDisplay">00:30</div>
            <div class="flex justify-center gap-4">
                <button onclick="controlTimer('start')" class="btn-neon bg-green-600/20 text-green-400 p-5 rounded-full border border-green-500/30">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
                </button>
                <button onclick="controlTimer('pause')" class="btn-neon bg-yellow-600/20 text-yellow-400 p-5 rounded-full border border-yellow-500/30">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z"/></svg>
                </button>
                <button onclick="controlTimer('reset')" class="btn-neon bg-red-600/20 text-red-400 p-5 rounded-full border border-red-500/30">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"/></svg>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="spinWheel()" class="btn-neon bg-purple-600/20 text-purple-400 py-6 rounded-xl border border-purple-500/30 font-black text-2xl flex items-center justify-center gap-3">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                تدوير عجلة الحظ
            </button>
            <button onclick="sendHint()" class="btn-neon bg-blue-600/20 text-blue-400 py-6 rounded-xl border border-blue-500/30 font-black text-2xl flex items-center justify-center gap-3">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                إرسال تلميحة
            </button>
        </div>
    </section>

    <section id="radar" class="tab-content space-y-6">
        <div class="glass p-6 rounded-xl cyber-corners">
            <h3 class="war-label mb-4 text-cyan-400">شبكة الفرق (32 فريق)</h3>
            <div class="team-grid" id="radarGrid"></div>
            <div class="mt-8 flex justify-center gap-4">
                <button onclick="deployMatch()" class="btn-neon bg-cyan-600 text-white px-12 py-4 rounded-xl font-black text-xl shadow-lg">تثبيت المباراة وبدء الإنزال 🚀</button>
            </div>
        </div>
    </section>

    <section id="judge" class="tab-content space-y-6">
        <div id="buzzerAlert" class="glass p-16 rounded-3xl text-center transition-all duration-300 cyber-corners">
            <div id="waitingState" class="">
                <div class="w-24 h-24 border-4 border-slate-700 rounded-full mx-auto mb-8 border-t-cyan-500 animate-spin"></div>
                <p class="text-slate-500 text-2xl font-black">جهاز التعقب يمسح الترددات...</p>
            </div>
            
            <div id="winnerInfo" class="hidden">
                <div class="war-label text-red-500 mb-4 font-bold text-xl animate-pulse">⚠️ رصد محاولة إجابة ⚠️</div>
                <div class="team-names text-7xl text-white mb-2" id="winnerName">---</div>
                <div class="team-names text-3xl text-cyan-400 mb-10" id="winnerTeam">---</div>
                <div class="grid grid-cols-2 gap-6">
                    <button onclick="answerResult(true)" class="btn-neon bg-green-600 text-white py-8 rounded-xl font-black text-4xl shadow-green-500/30">صح ✅</button>
                    <button onclick="answerResult(false)" class="btn-neon bg-red-600 text-white py-8 rounded-xl font-black text-4xl shadow-red-500/30">خطأ ❌</button>
                </div>
            </div>
        </div>
        
        <button onclick="resetBuzzers()" class="w-full glass py-6 rounded-xl border-2 border-cyan-500/30 text-cyan-400 font-black text-2xl hover:bg-cyan-500 hover:text-white">إعادة فتح البازرات للمتبقي 🔓</button>
    </section>

    <section id="stats" class="tab-content space-y-6">
        <div class="glass p-8 rounded-xl cyber-corners">
            <h3 class="war-label mb-6 text-yellow-400">نخبة العمالقة (Top 5)</h3>
            <div id="leaderboard" class="space-y-4">
                <!-- يتم التحديث من Firebase -->
            </div>
            <button onclick="announceMVP()" class="w-full mt-8 btn-neon bg-yellow-500 text-black py-4 rounded-xl font-black text-xl">إعلان رجل المباراة على الشاشة الكبيرة 🏆</button>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config (استخدم بياناتك هنا)
        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com", // تأكد من رابط قاعدة البيانات
            storageBucket: "amaleqa.firebasestorage.app",
            messagingSenderId: "635598551087",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const teams = Array.from({length: 32}, (_, i) => `فريق ${i + 1}`);
        let selectedTeams = [];

        let timerInterval;
        let timeLeft = 30;
        const timerDisplay = document.getElementById('timerDisplay');
        const buzzerRef = ref(db, 'buzzer');

        // بناء شبكة الفرق
        const grid = document.getElementById('radarGrid');
        teams.forEach(team => {
            const div = document.createElement('div');
            div.className = 'team-card glass p-4 rounded text-center font-bold text-sm hover:bg-white/10';
            div.innerText = team;
            div.onclick = () => toggleTeam(div, team);
            grid.appendChild(div);
        });

        function toggleTeam(el, name) {
            if (selectedTeams.includes(name)) {
                selectedTeams = selectedTeams.filter(t => t !== name);
                el.classList.remove('selected');
            } else if (selectedTeams.length < 2) {
                selectedTeams.push(name);
                el.classList.add('selected');
            }
        }

        window.deployMatch = () => {
            if (selectedTeams.length < 2) return alert("اختر فريقين أولاً!");
            update(ref(db, 'gameState'), {
                currentMatch: { team1: selectedTeams[0], team2: selectedTeams[1] },
                view: 'match_intro'
            });
            alert(`تم إرسال ${selectedTeams[0]} و ${selectedTeams[1]} للمسرح!`);
            openTab('live');
        };

        window.sendHint = () => {
            update(ref(db, 'gameState'), { 
                triggerHint: Date.now()
            });
            alert("تم إرسال تلميحة للجمهور!");
        };

        // --- وظائف التبديل بين التبويبات ---
        window.openTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active-tab');
        };

        window.spinWheel = () => {
            update(ref(db, 'gameState'), { 
                triggerSpin: Date.now(),
                view: 'wheel' 
            });
        };

        window.announceMVP = () => {
            update(ref(db, 'gameState'), { 
                view: 'mvp_announce',
                triggerMVP: Date.now()
            });
        };

        // --- نظام الوقت المتقدم ---
        window.controlTimer = (action) => {
            if (action === 'start') {
                if (timerInterval) return;
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerUI();
                    } else {
                        clearInterval(timerInterval);
                        timerInterval = null;
                    }
                }, 1000);
            } else if (action === 'pause') {
                clearInterval(timerInterval);
                timerInterval = null;
            } else if (action === 'reset') {
                clearInterval(timerInterval);
                timerInterval = null;
                timeLeft = 30;
                updateTimerUI();
            }
            // مزامنة مع الشاشة الكبيرة
            update(ref(db, 'gameState/timer'), { value: timeLeft, action: action });
        };

        function updateTimerUI() {
            const s = timeLeft < 10 ? '0' + timeLeft : timeLeft;
            timerDisplay.innerText = `00:${s}`;
            // إضافة توهج أحمر في آخر 5 ثواني
            timerDisplay.style.color = timeLeft <= 5 ? 'var(--neon-red)' : 'var(--neon-yellow)';
        }

        // --- الاستماع للبازر ---
        onValue(buzzerRef, (snapshot) => {
            const data = snapshot.val();
            const winnerInfo = document.getElementById('winnerInfo');
            const waitingState = document.getElementById('waitingState');
            const buzzerAlert = document.getElementById('buzzerAlert');

            if (data && data.active) {
                document.getElementById('winnerName').innerText = data.playerName;
                document.getElementById('winnerTeam').innerText = data.teamName;
                winnerInfo.classList.remove('hidden'); waitingState.classList.add('hidden');
                buzzerAlert.classList.add('shake-heavy');
            } else {
                winnerInfo.classList.add('hidden'); waitingState.classList.remove('hidden');
                buzzerAlert.classList.remove('shake-heavy');
            }
        });

        window.answerResult = (isCorrect) => {
            update(ref(db, 'gameState/lastResult'), {
                correct: isCorrect,
                timestamp: Date.now()
            });
            resetBuzzers();
        };

        window.resetBuzzers = () => {
            set(ref(db, 'buzzer'), { active: false, playerName: "", teamName: "" });
        };
    </script>
</body>
</html>
