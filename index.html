<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساحة العمالقة | The Arena 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'Amira'; src: url('اميرة.ttf'); }
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'DGRawnaq'; src: url('دي جي راونق.ttf'); }

        :root {
            --neon-red: #ff003c; --neon-blue: #00d2ff; --neon-gold: #facc15; --bg-dark: #020617;
        }

        body {
            background-color: var(--bg-dark);
            color: white; overflow: hidden; height: 100vh; margin: 0;
            font-family: 'Cairo', sans-serif; display: flex; flex-direction: column;
            transition: background-color 0.3s ease;
        }

        /* كلاسات الألوان الإجبارية */
        body.correct-bg { background-color: #16a34a !important; background-image: none !important; }
        body.wrong-bg { background-color: #dc2626 !important; background-image: none !important; }

        .team-card {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 20vw; min-width: 250px; padding: 40px 20px;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; z-index: 20;
        }
        .team-left { left: 0; border-radius: 0 40px 40px 0; border-right: 8px solid var(--neon-red); }
        .team-right { right: 0; border-radius: 40px 0 0 40px; border-left: 8px solid var(--neon-blue); }

        .score-num { font-family: 'DGRawnaq', sans-serif; font-size: 8rem; line-height: 1; }

        .main-arena {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0 22vw; z-index: 10;
        }

        .q-wrapper {
            width: 100%; text-align: center; background: rgba(255, 255, 255, 0.05);
            border-radius: 50px; padding: 60px 40px; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .question-text { font-family: 'Amira', sans-serif; font-size: 5.5rem; line-height: 1.2; }

        .answer-reveal {
            margin-top: 20px; font-family: 'Amira'; font-size: 5rem;
            color: #facc15; display: none; /* يظهر فقط عند ضغط الأدمن */
        }

        .timer-box {
            position: relative; width: 180px; height: 180px; margin-top: -90px;
            background: #020617; border-radius: 50%; padding: 10px;
        }

        .overlay-screen {
            position: fixed; inset: 0; z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div id="start-overlay" class="fixed inset-0 z-[999] bg-slate-950 flex flex-col items-center justify-center cursor-pointer">
        <h1 class="text-6xl font-['Belabelo'] text-yellow-500">اضغط للربط مع الأدمن</h1>
    </div>

    <div class="team-card team-left">
        <h2 id="nameA" class="text-4xl font-['Belabelo']">---</h2>
        <div id="scoreA" class="score-num text-red-500">00</div>
    </div>

    <div class="team-card team-right">
        <h2 id="nameB" class="text-4xl font-['Belabelo']">---</h2>
        <div id="scoreB" class="score-num text-blue-400">00</div>
    </div>

    <main class="main-arena">
        <div class="q-wrapper" id="q-container">
            <p id="question-text" class="question-text">بانتظار السؤال...</p>
            <div id="answer-reveal" class="answer-reveal">
                <span class="text-2xl block font-sans text-white/70">الإجابة:</span>
                <span id="final-answer">---</span>
            </div>
        </div>

        <div class="timer-box" id="timer-ui">
            <div id="timer-text" class="flex items-center justify-center h-full text-6xl font-black text-yellow-400 font-['DGRawnaq']">30</div>
        </div>
    </main>

    <div id="buzzer-overlay" class="overlay-screen">
        <h1 id="winner-name" class="text-9xl font-['Belabelo'] text-white">---</h1>
        <p class="text-3xl text-yellow-500 mt-4 animate-pulse">يجب أن يجيب الآن!</p>
    </div>

    <audio id="snd-correct" src="صح.mp3"></audio>
    <audio id="snd-wrong" src="خطأ.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('start-overlay').onclick = () => document.getElementById('start-overlay').style.display = 'none';

        // 1. تحديث النقاط والأسماء
        onValue(ref(db, 'teams'), (snap) => {
            const teams = snap.val(); if(!teams) return;
            const names = Object.keys(teams);
            if(names[0]) { document.getElementById('nameA').innerText = names[0]; document.getElementById('scoreA').innerText = teams[names[0]].score || 0; }
            if(names[1]) { document.getElementById('nameB').innerText = names[1]; document.getElementById('scoreB').innerText = teams[names[1]].score || 0; }
        });

        // 2. تحديث السؤال
        onValue(ref(db, 'current_question'), (snap) => {
            const q = snap.val();
            if(q) {
                document.getElementById('question-text').innerText = q.text;
                document.getElementById('final-answer').innerText = q.answer;
                // إعادة الوضع الطبيعي عند إرسال سؤال جديد
                document.body.classList.remove('correct-bg', 'wrong-bg');
                document.getElementById('question-text').style.display = 'block';
                document.getElementById('answer-reveal').style.display = 'none';
                document.getElementById('timer-ui').style.display = 'block';
            }
        });

        // 3. مراقبة البازر
        onValue(ref(db, 'buzzer_winner'), (snap) => {
            const winner = snap.val();
            const ov = document.getElementById('buzzer-overlay');
            if(winner) {
                document.getElementById('winner-name').innerText = winner.name;
                ov.style.display = 'flex';
            } else {
                ov.style.display = 'none';
            }
        });

        // 4. تنفيذ أوامر الأدمن (صح/خطأ) - التعديل الجوهري هنا
        onValue(ref(db, 'answer_result'), (snap) => {
            const res = snap.val();
            if(!res) {
                // إذا كانت القيمة null نعود للوضع الطبيعي
                document.body.classList.remove('correct-bg', 'wrong-bg');
                return;
            }

            if(res === 'correct') {
                document.body.className = 'correct-bg'; // الشاشة تنور أخضر
                document.getElementById('snd-correct').play();
                
                // إخفاء السؤال والمؤقت وإظهار الإجابة
                document.getElementById('question-text').style.display = 'none';
                document.getElementById('timer-ui').style.display = 'none';
                document.getElementById('answer-reveal').style.display = 'block';
            } 
            else if(res === 'wrong') {
                document.body.className = 'wrong-bg'; // الشاشة تنور أحمر
                document.getElementById('snd-wrong').play();
            }
        });

        // 5. المؤقت
        onValue(ref(db, 'timer_value'), (snap) => {
            document.getElementById('timer-text').innerText = snap.val() || 0;
        });

    </script>
</body>
</html>
