<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساحة العمالقة | The Arena 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'Amira'; src: url('اميرة.ttf'); }
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'DGRawnaq'; src: url('دي جي راونق.ttf'); }
        @font-face { font-family: 'Galaxy'; src: url('جالاكسي.ttf'); }

        :root {
            --neon-red: #ff003c;
            --neon-gold: #facc15;
            --neon-blue: #3b82f6;
            --neon-green: #22c55e;
            --bg-dark: #020617;
        }

        body {
            background: #020617;
            color: white; overflow: hidden; height: 100vh; margin: 0;
            font-family: 'Cairo', sans-serif;
        }

        #start-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }

        #particles-js { position: fixed; inset: 0; z-index: -1; }

        .team-panel {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 320px; padding: 50px 25px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .team-panel.left { left: 0; border-radius: 0 50px 50px 0; border-right: 10px solid var(--neon-red); }
        .team-panel.right { right: 0; border-radius: 50px 0 0 50px; border-left: 10px solid var(--neon-blue); }

        .score-val { font-family: 'DGRawnaq', sans-serif; font-size: 6rem; line-height: 1; text-shadow: 0 0 30px currentColor; }

        .question-zone { max-width: 1000px; margin: 0 auto; padding-top: 8vh; text-align: center; }

        .q-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 40px; padding: 50px;
            transition: all 0.5s ease;
        }

        .timer-reactor {
            width: 200px; height: 200px;
            margin: 30px auto; position: relative;
            transition: opacity 0.5s;
        }
        .timer-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .timer-circle {
            fill: none; stroke: var(--neon-gold); stroke-width: 12;
            stroke-dasharray: 565; transition: 1s linear;
        }

        .status-overlay {
            position: fixed; inset: 0; z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        #buzzer-overlay {
            position: fixed; inset: 0; z-index: 150;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.9);
        }

        .answer-box {
            margin-top: 25px; padding: 25px 60px;
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid var(--neon-green); border-radius: 25px;
            color: #4ade80; font-size: 2.8rem; font-weight: 900;
            opacity: 0; transform: translateY(20px); transition: 0.6s;
        }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="startArena()">
        <h1 class="text-6xl font-black text-yellow-500 mb-4" style="font-family: 'Belabelo';">دخول الساحة</h1>
        <p class="text-white/50 animate-bounce">اضغط لتفعيل الصوت والبدء</p>
    </div>

    <div id="particles-js"></div>

    <div class="team-panel left">
        <h2 id="nameA" class="text-5xl font-black text-white mb-8" style="font-family: 'Belabelo';">---</h2>
        <div id="scoreA" class="score-val text-red-500">00</div>
    </div>

    <div class="team-panel right">
        <h2 id="nameB" class="text-5xl font-black text-white mb-8" style="font-family: 'Belabelo';">---</h2>
        <div id="scoreB" class="score-val text-blue-400">00</div>
    </div>

    <main class="question-zone">
        <div id="q-container" class="q-card">
            <p id="question-text" class="text-5xl md:text-6xl font-black text-white font-['Amira']">بانتظار السؤال...</p>
        </div>

        <div id="timer-container" class="timer-reactor">
            <svg class="timer-svg" viewBox="0 0 200 200">
                <circle class="timer-circle" id="circleProgress" cx="100" cy="100" r="90"></circle>
            </svg>
            <div id="timer-text" class="absolute inset-0 flex items-center justify-center text-7xl font-black text-yellow-400 font-['DGRawnaq']">30</div>
        </div>

        <div id="answer-box" class="answer-box mx-auto inline-block">
            <span class="text-xl block text-white/40 font-bold mb-2">الإجابة:</span>
            <span id="final-answer" style="font-family: 'Amira';">---</span>
        </div>
    </main>

    <div id="buzzer-overlay">
        <h1 id="winner-name" class="text-9xl font-black text-white mb-4" style="font-family: 'Belabelo';">---</h1>
        <p id="winner-team-label" class="text-4xl text-yellow-500 font-bold">انقض على السؤال!</p>
    </div>

    <div id="correct-overlay" class="status-overlay bg-green-600/90 backdrop-blur-md">
        <div class="text-center">
            <div class="text-[15rem] mb-4">✅</div>
            <h1 class="text-9xl font-black text-white" style="font-family: 'Belabelo';">إجابة صحيحة</h1>
        </div>
    </div>

    <div id="wrong-overlay" class="status-overlay bg-red-600/90 backdrop-blur-md">
        <div class="text-center text-white">
            <div class="text-[15rem] mb-4">❌</div>
            <h1 class="text-9xl font-black" style="font-family: 'Belabelo';">إجابة خاطئة</h1>
        </div>
    </div>

    <audio id="buzzSound" src="https://assets.mixkit.co/active_storage/sfx/2959/2959-preview.mp3"></audio>
    <audio id="correctSound" src="صح.mp3"></audio>
    <audio id="wrongSound" src="خطأ.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            databaseURL: "https://amaleqa-default-rtdb.firebaseio.com",
            appId: "1:635598551087:web:fdf0ab135003224393eeda"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // تفعيل الصوت
        window.startArena = () => {
            document.getElementById('start-overlay').style.display = 'none';
            const sounds = ['buzzSound', 'correctSound', 'wrongSound'];
            sounds.forEach(id => {
                const a = document.getElementById(id);
                a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(e => {});
            });
        };

        particlesJS('particles-js', {
            particles: { number: { value: 50 }, color: { value: "#3b82f6" }, opacity: { value: 0.3 }, move: { enable: true, speed: 1 } }
        });

        // مراقبة السؤال والمؤقت
        onValue(ref(db, 'current_question'), (snap) => {
            const q = snap.val();
            if(q) {
                document.getElementById('question-text').innerText = q.text;
                document.getElementById('final-answer').innerText = q.answer;
                document.getElementById('answer-box').style.opacity = "0";
                document.getElementById('q-container').style.opacity = "1";
                document.getElementById('timer-container').style.opacity = "1";
            }
        });

        onValue(ref(db, 'timer_value'), (snap) => {
            const time = snap.val() || 0;
            document.getElementById('timer-text').innerText = time;
            const offset = 565 - (time / 30) * 565;
            document.getElementById('circleProgress').style.strokeDashoffset = offset;
        });

        // مراقبة البازر
        onValue(ref(db, 'buzzer_winner'), (snap) => {
            const winner = snap.val();
            const ov = document.getElementById('buzzer-overlay');
            if(winner && winner.name) {
                document.getElementById('winner-name').innerText = winner.name;
                ov.style.display = 'flex';
                document.getElementById('buzzSound').play();
            } else {
                ov.style.display = 'none';
            }
        });

        // التعديل المطلوب: عند ضغط صح أو خطأ في الأدمن
        onValue(ref(db, 'answer_result'), (snap) => {
            const result = snap.val();
            if(!result) return;

            const isCorrect = result === 'correct';
            const overlay = isCorrect ? document.getElementById('correct-overlay') : document.getElementById('wrong-overlay');
            const sound = isCorrect ? document.getElementById('correctSound') : document.getElementById('wrongSound');

            // إظهار النتيجة فوراً
            overlay.style.display = 'flex';
            sound.play();

            if(isCorrect) {
                // 1. إظهار الإجابة النموذجية
                document.getElementById('answer-box').style.opacity = "1";
                document.getElementById('answer-box').style.transform = "translateY(0)";
                
                // 2. إخفاء السؤال والمؤقت
                document.getElementById('q-container').style.opacity = "0";
                document.getElementById('timer-container').style.opacity = "0";
            }

            // الانتظار 4 ثواني ثم العودة للحالة الطبيعية
            setTimeout(() => {
                overlay.style.display = 'none';
                if(isCorrect) {
                    document.getElementById('question-text').innerText = "بانتظار السؤال الجديد...";
                    document.getElementById('q-container').style.opacity = "1";
                    document.getElementById('answer-box').style.opacity = "0";
                }
                set(ref(db, 'answer_result'), null);
            }, 4000);
        });

    </script>
</body>
</html>
