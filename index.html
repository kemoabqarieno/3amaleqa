<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة العمالقة 🏆</title>
    <style>
        /* تعريف الخطوط التي رفعتها */
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'DGRawnaq'; src: url('دي جي راونق.ttf'); }
        @font-face { font-family: 'Dahka'; src: url('ضحكه.ttf'); }
        @font-face { font-family: 'Galaxy'; src: url('جالاكسي.ttf'); }

        :root {
            --dark: #0f172a;
            --gold: #facc15;
            --green: #22c55e;
            --red: #ef4444;
            --white: #f8fafc;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- شاشة العرض (البروجكتور) --- */
        .display-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        .header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
        }

        .team-box { font-family: 'Belabelo'; }
        .score { font-size: 4rem; color: var(--gold); text-shadow: 0 0 10px rgba(250,204,21,0.5); }
        
        .main-logo {
            width: 150px; height: 150px;
            background: url('3amlq.png') no-repeat center/contain;
            filter: drop-shadow(0 0 15px var(--gold));
        }

        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }

        #display-q { font-family: 'DGRawnaq'; font-size: 3.5rem; margin-top: 20px; }
        #display-cat { font-family: 'Galaxy'; color: var(--gold); font-size: 1.8rem; }

        /* --- لوحة التحكم (الأدمن) --- */
        .admin-panel {
            background: #1e293b;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            height: 300px;
        }

        .control-group { border: 1px solid #334155; padding: 10px; border-radius: 8px; }
        h3 { margin-top: 0; font-size: 0.9rem; color: var(--gold); }

        input, select { width: 90%; padding: 8px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        
        .btn-send { background: var(--gold); color: var(--dark); }
        .btn-correct { background: var(--green); color: white; width: 100%; margin-top: 10px; }
        .player-btn { background: #475569; color: white; font-size: 0.8rem; margin: 2px; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(34, 197, 94, 0.9);
            display: none; justify-content: center; align-items: center;
            font-family: 'Dahka'; font-size: 8rem; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="correct-overlay" class="overlay">إجابة صحيحة! 🎉</div>

    <div class="display-screen">
        <div class="header">
            <div class="team-box">
                <div id="t1-name-disp">فريق الصقور</div>
                <div class="score" id="t1-score-disp">0</div>
            </div>
            <div class="main-logo"></div>
            <div class="team-box">
                <div id="t2-name-disp">فريق النجوم</div>
                <div class="score" id="t2-score-disp">0</div>
            </div>
        </div>
        <div class="question-area">
            <div id="display-cat">بانتظار السؤال...</div>
            <div id="display-q">جاهزون للمنافسة؟</div>
        </div>
    </div>

    <div class="admin-panel">
        <div class="control-group">
            <h3>1. إرسال سؤال</h3>
            <input type="text" id="cat-input" placeholder="الفئة (مثلاً: علوم)">
            <input type="text" id="q-input" placeholder="نص السؤال">
            <button class="btn-send" onclick="updateQuestion()">إرسال للشاشة 🚀</button>
        </div>

        <div class="control-group">
            <h3>2. تبديل الفرق (الـ 32 فريق)</h3>
            <input type="text" id="t1-name-input" placeholder="اسم فريق 1" onchange="updateNames()">
            <input type="text" id="t2-name-input" placeholder="اسم فريق 2" onchange="updateNames()">
            <div style="margin-top:10px;">
                <button class="player-btn" onclick="addScore(1, 10)">+10 لفريق 1</button>
                <button class="player-btn" onclick="addScore(2, 10)">+10 لفريق 2</button>
            </div>
        </div>

        <div class="control-group">
            <h3>3. رجل المباراة (4 لاعبين)</h3>
            <div id="players-list">
                <button class="player-btn" onclick="celebrate()">✅ صح (احتفال)</button>
                <p style="font-size: 0.7rem;">اختر اللاعب الذي جاوب:</p>
                <button class="player-btn">لاعب 1</button>
                <button class="player-btn">لاعب 2</button>
                <button class="player-btn">لاعب 3</button>
                <button class="player-btn">لاعب 4</button>
            </div>
        </div>
    </div>

    <script>
        let data = {
            t1Score: 0,
            t2Score: 0,
            t1Name: "فريق 1",
            t2Name: "فريق 2"
        };

        function updateQuestion() {
            document.getElementById('display-cat').innerText = "المجال: " + document.getElementById('cat-input').value;
            document.getElementById('display-q').innerText = document.getElementById('q-input').value;
        }

        function updateNames() {
            data.t1Name = document.getElementById('t1-name-input').value || "فريق 1";
            data.t2Name = document.getElementById('t2-name-input').value || "فريق 2";
            document.getElementById('t1-name-disp').innerText = data.t1Name;
            document.getElementById('t2-name-disp').innerText = data.t2Name;
        }

        function addScore(team, pts) {
            if(team === 1) {
                data.t1Score += pts;
                document.getElementById('t1-score-disp').innerText = data.t1Score;
            } else {
                data.t2Score += pts;
                document.getElementById('t2-score-disp').innerText = data.t2Score;
            }
        }

        function celebrate() {
            const overlay = document.getElementById('correct-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
