<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة العمالقة الكبرى 🏆</title>
    <style>
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'DGRawnaq'; src: url('دي جي راونق.ttf'); }
        @font-face { font-family: 'Dahka'; src: url('ضحكه.ttf'); }

        :root {
            --primary: #0f172a;
            --accent: #facc15;
            --white: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--primary);
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        /* تقسيم الشاشة الاستراتيجي */
        .grid-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 150px 1fr 100px;
            height: 100vh;
            gap: 10px;
            padding: 10px;
        }

        /* الهيدر واللوجو */
        .main-header {
            grid-column: 1 / span 3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border-bottom: 3px solid var(--accent);
        }

        .logo-box {
            width: 120px; height: 120px;
            background: url('3amlq.png') no-repeat center/contain;
        }

        /* الموقت */
        .timer-box {
            font-family: 'Dahka';
            font-size: 4rem;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(250,204,21,0.4);
        }

        /* منطقة العرض الوسطى (الأسئلة + البازر) */
        .content-area {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #question-display {
            font-family: 'DGRawnaq';
            font-size: 3.5vw;
            text-align: center;
        }

        /* واجهة "البطل" اللي داس بازر */
        #buzzer-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent);
            color: var(--primary);
            display: none; /* يظهر فقط عند الضغط */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            animation: bounceIn 0.6s ease;
            z-index: 100;
        }

        .winner-name { font-family: 'Dahka'; font-size: 5rem; }
        .winner-team { font-family: 'Belabelo'; font-size: 2.5rem; }

        /* الجوانب (النقاط وعجلة الحظ) */
        .side-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-item {
            font-family: 'Belabelo';
            margin-bottom: 20px;
            text-align: center;
        }

        .score-val { font-size: 2.5rem; color: var(--accent); }

        /* عجلة الحظ البسيطة */
        .wheel-placeholder {
            width: 150px; height: 150px;
            border: 5px dashed var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            font-size: 0.8rem;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <header class="main-header">
            <div class="team-top">فريق: <span id="current-t1" style="font-family:'Belabelo'">الصقور</span></div>
            <div class="logo-box"></div>
            <div class="timer-box" id="timer">30</div>
            <div class="team-top">فريق: <span id="current-t2" style="font-family:'Belabelo'">النجوم</span></div>
        </header>

        <aside class="side-panel">
            <h3 style="font-family:'Belabelo'">الترتيب</h3>
            <div class="score-item">
                <div>الصقور</div>
                <div class="score-val">120</div>
            </div>
            <div class="score-item">
                <div>النجوم</div>
                <div class="score-val">95</div>
            </div>
        </aside>

        <main class="content-area">
            <div id="question-display">في أي عام بدأت مسابقة العمالقة؟</div>
            
            <div id="buzzer-overlay">
                <div class="winner-team" id="win-team">فريق الصقور</div>
                <div class="winner-name" id="win-name">أحمد محمد</div>
                <p>يجاوب الآن...</p>
            </div>
        </main>

        <aside class="side-panel">
            <h3 style="font-family:'Belabelo'">عجلة الحظ</h3>
            <div class="wheel-placeholder">SPIN 🎡</div>
            <p style="font-size: 0.7rem; text-align: center; margin-top: 10px;">عجلة لاختيار فئة السؤال</p>
        </aside>

        <footer style="grid-column: 1 / span 3; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-family:'Belabelo';">
            رجل المباراة المتوقع: <span id="mvp" style="color:var(--accent); margin-right: 10px;"> ؟؟؟ </span>
        </footer>
    </div>

    <script>
        // دالة محاكاة لوصول إشارة من البازر (دي اللي هتتربط بالفايربيس)
        function triggerBuzzer(name, team) {
            document.getElementById('win-name').innerText = name;
            document.getElementById('win-team').innerText = team;
            document.getElementById('buzzer-overlay').style.display = 'flex';
            // إيقاف التايمر برمجياً هنا
        }

        // لإخفاء البازر والعودة للسؤال (يتم التحكم بها من عندك)
        function resetBuzzer() {
            document.getElementById('buzzer-overlay').style.display = 'none';
        }
        
        // تجربة: دوس على الشاشة عشان تشوف شكل البازر لما يشتغل
        document.body.onclick = () => triggerBuzzer("مصطفى محمد", "فريق العمالقة");
    </script>
</body>
</html>
