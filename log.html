<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الانضمام لمسابقة العمالقة 🏆</title>
    <style>
        /* تعريف الخطوط الفخمة */
        @font-face { font-family: 'Belabelo'; src: url('بلابيلو.ttf'); }
        @font-face { font-family: 'DGRawnaq'; src: url('دي جي راونق.ttf'); }
        @font-face { font-family: 'Dahka'; src: url('ضحكه.ttf'); }
        @font-face { font-family: 'Galaxy'; src: url('جالاكسي.ttf'); }

        :root {
            --bg-dark: #070b14;
            --glass: rgba(255, 255, 255, 0.03);
            --accent-gold: #facc15;
            --accent-neon: #38bdf8;
            --text-main: #f8fafc;
            --border-color: rgba(56, 189, 248, 0.2);
            --success-green: #22c55e;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(at 10% 10%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(250, 204, 21, 0.08) 0px, transparent 50%);
        }

        .join-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            animation: cardSlideIn 1s ease-out;
            margin-top: 50px;
        }

        .logo-circle-container {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background-color: var(--bg-dark);
            border-radius: 50%;
            border: 4px solid var(--accent-gold);
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            z-index: 10;
        }

        .logo-img {
            width: 90%;
            height: 90%;
            background: url('3amlq.png') no-repeat center/contain;
        }

        .main-title {
            font-family: 'Belabelo', sans-serif;
            font-size: 2.8rem;
            color: var(--accent-gold);
            margin: 60px 0 10px 0;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.3);
        }

        .sub-title {
            font-family: 'DGRawnaq', sans-serif;
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
            text-align: right;
        }

        .input-label {
            display: block;
            font-family: 'DGRawnaq', sans-serif;
            font-size: 0.9rem;
            color: var(--accent-neon);
            margin-bottom: 8px;
            margin-right: 5px;
        }

        .styled-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: 'Galaxy', sans-serif;
        }

        .styled-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        .styled-input::placeholder {
            color: #475569;
            font-size: 0.9rem;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn-join {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #eab308 100%);
            border: none;
            border-radius: 12px;
            color: var(--bg-dark);
            font-family: 'Dahka', sans-serif;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }

        .btn-join:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(250, 204, 21, 0.4);
        }

        .custom-alert-container {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(34, 197, 94, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid var(--success-green);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            z-index: 2000;
            transition: top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .alert-show { top: 20px; }

        .alert-icon {
            width: 40px; height: 40px;
            background-color: var(--success-green);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 1.5rem;
        }

        .alert-text {
            flex: 1;
            font-family: 'Dahka', sans-serif;
            font-size: 1.4rem;
            color: var(--text-main);
        }

        @keyframes cardSlideIn {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="customAlert" class="custom-alert-container">
        <div class="alert-icon">✓</div>
        <div class="alert-text">تم تسجيل فريقك بنجاح!</div>
    </div>

    <div class="join-container">
        <div class="logo-circle-container">
            <div class="logo-img"></div>
        </div>

        <h1 class="main-title">العمالقة</h1>
        <p class="sub-title">ادخل بيانات فريقك للاستعداد للمعركة</p>

        <form id="joinForm">
            <div class="input-group">
                <label class="input-label">اسم الفريق (المجموعة)</label>
                <input type="text" id="teamName" class="styled-input" placeholder="مثلاً: صقور المستقبل" required>
            </div>

            <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label class="input-label">اللاعب 1 (القائد)</label><input type="text" class="styled-input player-name" placeholder="الاسم الثنائي" required></div>
                <div><label class="input-label">اللاعب 2</label><input type="text" class="styled-input player-name" placeholder="الاسم الثنائي" required></div>
                <div><label class="input-label">اللاعب 3</label><input type="text" class="styled-input player-name" placeholder="الاسم الثنائي" required></div>
                <div><label class="input-label">اللاعب 4</label><input type="text" class="styled-input player-name" placeholder="الاسم الثنائي" required></div>
            </div>

            <button type="submit" id="submitBtn" class="btn-join">تأكيد الانضمام 🔥</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعداداتك اللي بعتها
        const firebaseConfig = {
            apiKey: "AIzaSyDaI4s3PZ3w3JocR9D2rthbsSx-7_jZFVc",
            authDomain: "amaleqa.firebaseapp.com",
            projectId: "amaleqa",
            storageBucket: "amaleqa.firebasestorage.app",
            messagingSenderId: "635598551087",
            appId: "1:635598551087:web:fdf0ab135003224393eeda",
            measurementId: "G-C93N915P5G"
        };

        // تهيئة الفايربيز
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // وظيفة التنبيه
        window.showSuccessAlert = function(message) {
            const alert = document.getElementById('customAlert');
            const alertText = alert.querySelector('.alert-text');
            alertText.innerText = message;
            alert.classList.add('alert-show');
            setTimeout(() => alert.classList.remove('alert-show'), 3000);
        }

        // تسجيل البيانات
        document.getElementById('joinForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const teamName = document.getElementById('teamName').value;
            const players = Array.from(document.querySelectorAll('.player-name')).map(input => input.value);

            btn.innerText = "جاري الحفظ في القاعدة...";
            btn.disabled = true;

            // إرسال البيانات للـ Realtime Database
            set(ref(db, 'teams/' + teamName), {
                players: players,
                score: 0,
                timestamp: Date.now()
            })
            .then(() => {
                showSuccessAlert("تم تسجيل فريق " + teamName + " بنجاح!");
                e.target.reset();
            })
            .catch((error) => {
                console.error(error);
                alert("حدث خطأ في الشبكة، حاول مرة أخرى!");
            })
            .finally(() => {
                btn.innerText = "تأكيد الانضمام 🔥";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
